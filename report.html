<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg">
  <title>命理报告 · 道器</title>
  <meta name="description" content="您的专属命理分析报告。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== 科技道家风 ===== */
    :root {
      --glow-gold: 0 0 20px rgba(201,168,76,0.3), 0 0 40px rgba(201,168,76,0.1);
      --glow-cyan: 0 0 20px rgba(74,158,139,0.3), 0 0 40px rgba(74,158,139,0.1);
      --border-tech: 1px solid rgba(201,168,76,0.25);
      --scan-speed: 6s;
    }

    /* 全局扫描线覆盖 */
    .tech-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px, rgba(201,168,76,0.015) 2px, rgba(201,168,76,0.015) 4px
      );
    }

    /* ---- Tab 导航栏 ---- */
    .tab-nav {
      position: sticky; top: 60px; z-index: 100;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid rgba(201,168,76,0.15);
      margin-bottom: var(--space-lg);
    }
    .tab-nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; gap: 0; overflow-x: auto;
      padding: 0 var(--space-md); scrollbar-width: none;
    }
    .tab-nav-inner::-webkit-scrollbar { display: none; }

    .tab-btn {
      position: relative;
      flex-shrink: 0; padding: var(--space-sm) var(--space-md);
      background: none; border: none; color: #8B8577;
      font-family: var(--font-body); font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all 0.3s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
    }
    .tab-btn:hover { color: #C9A84C; }
    .tab-btn.active {
      color: #C9A84C;
      text-shadow: 0 0 12px rgba(201,168,76,0.4);
    }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
      height: 2px; background: linear-gradient(90deg,transparent,#C9A84C,#C9A84C,transparent);
      box-shadow: 0 0 10px rgba(201,168,76,0.5);
    }
    .tab-btn .tab-icon { font-size: 1.1em; }
    @media (max-width: 768px) {
      .tab-btn { padding: 0.6rem 0.9rem; font-size: 0.8rem; }
      .tab-nav { top: 52px; }
    }

    /* ---- 内容面板 ---- */
    .tab-panel {
      display: none;
      animation: panelFadeIn 0.4s ease;
    }
    .tab-panel.active { display: block; }
    @keyframes panelFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- 科技感卡片 ---- */
    .tech-card {
      background: linear-gradient(135deg, rgba(26,31,46,0.85), rgba(13,17,23,0.9));
      border: var(--border-tech); border-radius: var(--radius-md);
      padding: var(--space-lg); margin-bottom: var(--space-md);
      position: relative; overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .tech-card:hover {
      border-color: rgba(201,168,76,0.4);
      box-shadow: var(--glow-gold);
    }
    .tech-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    }
    /* 六边形装饰角 */
    .hex-corner {
      position: absolute; width: 24px; height: 24px;
      opacity: 0.15; pointer-events: none;
      border: 1px solid #C9A84C;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .hex-corner.tl { top: 8px; left: 8px; }
    .hex-corner.br { bottom: 8px; right: 8px; }

    .tech-card-header {
      display: flex; align-items: center; gap: var(--space-md);
      margin-bottom: var(--space-md); padding-bottom: var(--space-sm);
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .tech-card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      border: 1px solid rgba(201,168,76,0.3);
      background: rgba(201,168,76,0.06);
    }
    .tech-card-title { font-family: var(--font-heading); font-size: 1.15rem; color: #C9A84C; }
    .tech-card-sub { font-size: 0.8rem; color: #8B8577; }

    /* ---- 八字柱阵 ---- */
    .pillar-grid {
      display: flex; justify-content: center; gap: var(--space-lg);
      flex-wrap: wrap; margin-top: var(--space-md);
    }
    .pillar-cell {
      text-align: center; position: relative;
    }
    .pillar-cell::before {
      content: ''; position: absolute; inset: -8px;
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 12px;
      background: radial-gradient(circle at center, rgba(201,168,76,0.03) 0%, transparent 70%);
      z-index: -1;
    }
    .pillar-label { font-size: 0.75rem; color: #8B8577; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
    .pillar-gan, .pillar-zhi {
      font-family: var(--font-heading); font-size: 2rem; font-weight: 700;
      line-height: 1.2; transition: text-shadow 0.3s;
    }
    .pillar-gan { color: #E8E0D4; }
    .pillar-zhi { color: #8B8577; }
    .pillar-cell.highlight .pillar-gan {
      color: #C9A84C;
      text-shadow: 0 0 20px rgba(201,168,76,0.5);
    }
    .pillar-cell.highlight .pillar-zhi { color: #C9A84C; }

    /* ---- 五行能量环 ---- */
    .wuxing-ring {
      display: flex; justify-content: center; gap: var(--space-md);
      margin-top: var(--space-md); flex-wrap: wrap;
    }
    .wuxing-node {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 600;
      border: 2px solid transparent;
      transition: all 0.4s;
      position: relative;
    }
    .wuxing-node::after {
      content: attr(data-count);
      position: absolute; bottom: -18px; font-size: 0.7rem; color: #8B8577;
    }
    .wuxing-node.wood { background: rgba(107,142,35,0.15); border-color: #6B8E23; color: #6B8E23; }
    .wuxing-node.fire { background: rgba(220,53,69,0.15); border-color: #DC3545; color: #DC3545; }
    .wuxing-node.earth { background: rgba(205,133,63,0.15); border-color: #CD853F; color: #CD853F; }
    .wuxing-node.metal { background: rgba(168,169,173,0.15); border-color: #A8A9AD; color: #A8A9AD; }
    .wuxing-node.water { background: rgba(70,130,180,0.15); border-color: #4682B4; color: #4682B4; }

    /* ---- 紫微星盘 ---- */
    .ziwei-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 4px; margin-top: var(--space-md);
    }
    @media (max-width: 600px) { .ziwei-grid { grid-template-columns: repeat(3, 1fr); } }

    .ziwei-palace {
      background: rgba(26,31,46,0.7); border: 1px solid rgba(201,168,76,0.12);
      border-radius: 8px; padding: var(--space-sm); text-align: center;
      min-height: 80px; display: flex; flex-direction: column; justify-content: center;
      transition: all 0.3s;
    }
    .ziwei-palace.ming { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.08); }
    .ziwei-palace.shen { border-color: rgba(74,158,139,0.5); background: rgba(74,158,139,0.08); }
    .ziwei-palace-name { font-size: 0.75rem; color: #8B8577; margin-bottom: 4px; }
    .ziwei-palace-stars { font-size: 0.85rem; color: #C9A84C; font-weight: 500; }
    .ziwei-palace:empty::after { content: '—'; color: rgba(139,133,119,0.3); }

    /* ---- 卦象装饰 ---- */
    .gua-decoration {
      display: flex; gap: 6px; justify-content: center; margin: var(--space-md) 0;
    }
    .gua-line {
      width: 40px; height: 3px; border-radius: 2px; opacity: 0.2;
    }
    .gua-line.yang { background: #C9A84C; width: 40px; }
    .gua-line.yin { display: flex; gap: 3px; }
    .gua-line.yin span { flex: 1; height: 3px; background: #C9A84C; border-radius: 2px; }

    /* ---- 太极旋转 ---- */
    @keyframes taijiSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .taiji-spin {
      animation: taijiSpin 20s linear infinite;
    }

    /* ---- 逐字显现文本 ---- */
    @keyframes textReveal {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .reveal-text span {
      display: inline-block; animation: textReveal 0.3s ease both;
    }

    /* ---- 数据涟漪 ---- */
    .ripple-bar {
      height: 6px; border-radius: 3px; margin-bottom: var(--space-sm);
      background: rgba(201,168,76,0.1);
      position: relative; overflow: hidden;
    }
    .ripple-bar::after {
      content: ''; position: absolute; top: 0; left: 0; height: 100%;
      border-radius: 3px;
      animation: rippleFlow 2s ease infinite;
    }
    .ripple-bar.gold::after { background: linear-gradient(90deg, transparent, #C9A84C, transparent); }
    .ripple-bar.jade::after { background: linear-gradient(90deg, transparent, #4A9E8B, transparent); animation-delay: 0.5s; }
    .ripple-bar.red::after  { background: linear-gradient(90deg, transparent, #C75B5B, transparent); animation-delay: 1s; }
    @keyframes rippleFlow {
      0% { left: -50%; width: 30%; }
      60% { left: 100%; width: 30%; }
      100% { left: 100%; width: 0; }
    }

    /* ---- 网格背景（紫微盘） ---- */
    .grid-bg {
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ---- 流年时间轴 ---- */
    .timeline-bar {
      display: flex; align-items: center; gap: 8px; margin: var(--space-md) 0;
    }
    .timeline-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid #C9A84C;
      position: relative;
    }
    .timeline-dot.current {
      width: 16px; height: 16px; background: #C9A84C;
      box-shadow: 0 0 12px rgba(201,168,76,0.5);
    }
    .timeline-line {
      flex: 1; height: 1px; background: linear-gradient(90deg, rgba(201,168,76,0.5), rgba(201,168,76,0.1));
    }

    /* ---- Lock overlay 重写 ---- */
    .lock-overlay {
      text-align: center; padding: var(--space-lg);
      background: linear-gradient(180deg, transparent, rgba(13,17,23,0.8));
      border-radius: var(--radius-md);
    }

    /* ---- 综合运势卡片 ---- */
    .fortune-summary {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-md);
    }
    .fortune-stat {
      text-align: center; padding: var(--space-lg);
      background: rgba(26,31,46,0.6); border-radius: var(--radius-md);
      border: 1px solid rgba(201,168,76,0.1);
    }
    .fortune-stat-value {
      font-family: var(--font-heading); font-size: 2.5rem;
      background: linear-gradient(135deg, #C9A84C 30%, #E8C97A 60%, #C9A84C 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .fortune-stat-label { color: #8B8577; font-size: 0.85rem; margin-top: var(--space-xs); }
  </style>
</head>
<body>
<div class="tech-overlay"></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">道器</a>
    <a href="checkout.html" class="btn btn-primary">预约专家</a>
  </div>
</nav>

<main class="report-page">
  <!-- ===== 顶部 · 八字柱阵 ===== -->
  <header class="report-header" id="reportHeader" style="text-align:center;">
    <h1 id="reportTitle" style="font-family:var(--font-heading);font-size:2rem;color:#E8E0D4;">道器 · 命理推演</h1>
    <p style="color:#8B8577;margin-bottom:var(--space-md);">紫微斗数 · 四柱八字 · 面相手相 · 风水布局</p>

    <!-- 卦象装饰线 -->
    <div class="gua-decoration" id="guaDeco"></div>

    <!-- 四柱显示 -->
    <div class="pillar-grid" id="baziDisplay">
      <div class="pillar-cell"><div class="pillar-label">年柱</div><div class="pillar-gan" id="yearGan">—</div><div class="pillar-zhi" id="yearZhi">—</div></div>
      <div class="pillar-cell"><div class="pillar-label">月柱</div><div class="pillar-gan" id="monthGan">—</div><div class="pillar-zhi" id="monthZhi">—</div></div>
      <div class="pillar-cell highlight"><div class="pillar-label">日柱</div><div class="pillar-gan" id="dayGan">—</div><div class="pillar-zhi" id="dayZhi">—</div></div>
      <div class="pillar-cell"><div class="pillar-label">时柱</div><div class="pillar-gan" id="hourGan">—</div><div class="pillar-zhi" id="hourZhi">—</div></div>
    </div>

    <!-- 五行能量环 -->
    <div class="wuxing-ring" id="wuxingRing"></div>

    <!-- 日主强弱的脉冲波纹 -->
    <div id="strengthZone" style="margin-top:var(--space-md);">
      <div class="ripple-bar gold" style="width:60%;margin:0 auto;"></div>
      <div class="ripple-bar jade" style="width:40%;margin:var(--space-xs) auto;"></div>
      <div class="ripple-bar red" style="width:30%;margin:var(--space-xs) auto;"></div>
    </div>

    <div id="strengthBadge" style="margin-top:var(--space-sm);"></div>
  </header>

  <!-- ===== Tab 导航 ===== -->
  <nav class="tab-nav" id="tabNav">
    <div class="tab-nav-inner">
      <button class="tab-btn active" data-panel="bazi">
        <span class="tab-icon">☯</span> 命盘总览
      </button>
      <button class="tab-btn" data-panel="ziwei">
        <span class="tab-icon">⭐</span> 紫微斗数
      </button>
      <button class="tab-btn" data-panel="mianxiang">
        <span class="tab-icon">👁</span> 面相分析
      </button>
      <button class="tab-btn" data-panel="shouxiang">
        <span class="tab-icon">✋</span> 手相分析
      </button>
      <button class="tab-btn" data-panel="fengshui">
        <span class="tab-icon">🏠</span> 风水布局
      </button>
      <button class="tab-btn" data-panel="liunian">
        <span class="tab-icon">📅</span> 流年运势
      </button>
    </div>
  </nav>

  <!-- ===== 内容面板 ===== -->
  <div class="report-sections" id="reportSections" style="max-width:1100px;margin:0 auto;padding:0 var(--space-md);">
    <!-- 加载动画 -->
    <div id="loadingIndicator" style="text-align:center;padding:4rem 0;">
      <div style="width:60px;height:60px;margin:0 auto;border:2px solid rgba(201,168,76,0.2);border-top-color:#C9A84C;border-radius:50%;animation:taijiSpin 2s linear infinite;"></div>
      <p style="color:#C9A84C;font-size:1.2rem;margin-top:var(--space-md);">推演中，接通天地之气……</p>
      <p style="color:#8B8577;">请稍候</p>
    </div>

    <!-- Tab 1: 命盘总览 -->
    <div class="tab-panel active" id="panel-bazi"></div>

    <!-- Tab 2: 紫微斗数 -->
    <div class="tab-panel" id="panel-ziwei"></div>

    <!-- Tab 3: 面相 -->
    <div class="tab-panel" id="panel-mianxiang"></div>

    <!-- Tab 4: 手相 -->
    <div class="tab-panel" id="panel-shouxiang"></div>

    <!-- Tab 5: 风水 -->
    <div class="tab-panel" id="panel-fengshui"></div>

    <!-- Tab 6: 流年 -->
    <div class="tab-panel" id="panel-liunian"></div>

    <!-- 真人专家 CTA（始终可见） -->
    <div id="expertCTA" style="margin-top:var(--space-xl);"></div>
  </div>
</main>

<footer class="footer" style="margin-top:var(--space-xl);">
  <div class="container"><p class="footer-copy">© 2026 道器命理 · 紫微斗数 · 四柱八字 · 仅供参考</p></div>
</footer>

<script>
// ===== 核心数据 =====
const birthData = JSON.parse(sessionStorage.getItem('birthData') || '{}');
const urlParams = new URLSearchParams(window.location.search);
const IS_TESTING = true;  // 测试阶段全部开放
let baziResult = null;

// ===== 加载报告 =====
async function loadReport() {
  const loading = document.getElementById('loadingIndicator');
  try {
    const params = new URLSearchParams();
    if (birthData.name) {
      params.set('name', birthData.name);
      params.set('gender', birthData.gender || 'male');
      params.set('year', birthData.year);
      params.set('month', birthData.month);
      params.set('day', birthData.day);
      params.set('hour', birthData.hour || '子时');
      params.set('calendar', birthData.calendar || 'solar');
    } else {
      const now = new Date();
      params.set('name', '访客');
      params.set('year', now.getFullYear());
      params.set('month', now.getMonth() + 1);
      params.set('day', now.getDate());
      params.set('hour', '子时');
    }
    const resp = await fetch('/api/bazi?' + params.toString());
    baziResult = await resp.json();
    if (loading) loading.remove();

    renderHeader();
    renderAllTabs();
    initTabs();
    lucide.createIcons();

  } catch (err) {
    if (loading) loading.innerHTML = '<p style="color:#C75B5B;">数据加载失败</p><a href="form.html" class="btn btn-primary" style="margin-top:1rem;">返回填写</a>';
  }
}

// ===== 渲染顶部 =====
function renderHeader() {
  const d = baziResult;
  const p = d.pillars;

  document.getElementById('reportTitle').textContent = d.name + ' · 命理报告';

  // 四柱
  document.getElementById('yearGan').textContent = p.year[0];
  document.getElementById('yearZhi').textContent = p.year[1];
  document.getElementById('monthGan').textContent = p.month[0];
  document.getElementById('monthZhi').textContent = p.month[1];
  document.getElementById('dayGan').textContent = p.day[0];
  document.getElementById('dayZhi').textContent = p.day[1];
  document.getElementById('hourGan').textContent = p.hour[0];
  document.getElementById('hourZhi').textContent = p.hour[1];

  // 五行能量环
  const wc = d.wuxingCount;
  const wnn = { '金':'metal','木':'wood','水':'water','火':'fire','土':'earth' };
  const ring = document.getElementById('wuxingRing');
  ring.innerHTML = '';
  for (const [k, v] of Object.entries(wnn)) {
    const cnt = wc[k] || 0;
    const opacity = 0.3 + (cnt / 8) * 0.7;
    ring.innerHTML += `<div class="wuxing-node ${v}" data-count="${cnt}" style="opacity:${opacity}">${k}</div>`;
  }

  // 强弱标记
  const s = d.strength;
  const sc = s.includes('强') ? '#C75B5B' : s.includes('弱') ? '#4A9E8B' : '#C9A84C';
  document.getElementById('strengthBadge').innerHTML = `<span style="display:inline-block;padding:0.3rem 1.2rem;border-radius:100px;font-size:0.9rem;background:${sc}15;color:${sc};border:1px solid ${sc}30;">日主 ${d.dayMaster}${d.dayWuxing} · ${s}</span>`;

  // 随机卦象装饰
  const guaDeco = document.getElementById('guaDeco');
  const guas = [
    '111111', '000000', '111010', '010111', '101010', '110011', '001100', '100010'
  ];
  const gArr = (guas[Math.floor(Math.random() * guas.length)]).split('');
  let gHtml = '';
  for (const l of gArr) {
    if (l === '1') gHtml += '<div class="gua-line yang"></div>';
    else gHtml += '<div class="gua-line yin"><span></span><span></span></div>';
  }
  guaDeco.innerHTML = gHtml;
}

// ===== 渲染所有 Tab =====
function renderAllTabs() {
  const d = baziResult;
  const isFree = IS_TESTING ? false : true;

  document.getElementById('panel-bazi').innerHTML = buildBaziPanel(d);
  document.getElementById('panel-ziwei').innerHTML = buildZiweiPanel(d, isFree);
  document.getElementById('panel-mianxiang').innerHTML = buildMianXiangPanel(d, isFree);
  document.getElementById('panel-shouxiang').innerHTML = buildShouXiangPanel(d, isFree);
  document.getElementById('panel-fengshui').innerHTML = buildFengshuiPanel(d, isFree);
  document.getElementById('panel-liunian').innerHTML = buildLiunianPanel(d, isFree);
  document.getElementById('expertCTA').innerHTML = buildExpertCTA();
}

// ===== Tab 切换 =====
function initTabs() {
  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
      // 延迟重新初始化图标
      setTimeout(() => lucide.createIcons(), 100);
    });
  });
}

// ===== 科技卡片模板 =====
function techCard(icon, title, subtitle, content, extraClass) {
  return `<div class="tech-card ${extraClass||''}">
    <div class="hex-corner tl"></div><div class="hex-corner br"></div>
