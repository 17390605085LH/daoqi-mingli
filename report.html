<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg">
  <title>命理报告 · 道器</title>
  <meta name="description" content="您的专属命理分析报告。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --glow-gold: 0 0 20px rgba(201,168,76,0.3), 0 0 40px rgba(201,168,76,0.1);
      --glow-cyan: 0 0 20px rgba(74,158,139,0.3), 0 0 40px rgba(74,158,139,0.1);
      --border-tech: 1px solid rgba(201,168,76,0.25);
    }

    .tech-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(201,168,76,0.012) 2px, rgba(201,168,76,0.012) 4px);
    }

    /* Tab nav */
    .tab-nav {
      position: sticky; top: 60px; z-index: 100;
      background: rgba(13,17,23,0.94); backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid rgba(201,168,76,0.15); margin-bottom: var(--space-lg);
    }
    .tab-nav-inner {
      max-width: 1100px; margin: 0 auto; display: flex; gap: 0; overflow-x: auto;
      padding: 0 var(--space-md); scrollbar-width: none;
    }
    .tab-nav-inner::-webkit-scrollbar { display: none; }
    .tab-btn {
      position: relative; flex-shrink: 0; padding: var(--space-sm) var(--space-md);
      background: none; border: none; color: #8B8577;
      font-family: var(--font-body); font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all 0.3s; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
    }
    .tab-btn:hover { color: #C9A84C; }
    .tab-btn.active { color: #C9A84C; text-shadow: 0 0 12px rgba(201,168,76,0.4); }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
      height: 2px; background: linear-gradient(90deg,transparent,#C9A84C,#C9A84C,transparent);
      box-shadow: 0 0 10px rgba(201,168,76,0.5);
    }
    @media (max-width: 768px) {
      .tab-btn { padding: 0.6rem 0.9rem; font-size: 0.8rem; }
      .tab-nav { top: 52px; }
    }

    .tab-panel { display: none; animation: panelFadeIn 0.4s ease; }
    .tab-panel.active { display: block; }
    @keyframes panelFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Tech card */
    .tech-card {
      background: linear-gradient(135deg, rgba(26,31,46,0.85), rgba(13,17,23,0.9));
      border: var(--border-tech); border-radius: var(--radius-md);
      padding: var(--space-lg); margin-bottom: var(--space-md);
      position: relative; overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .tech-card:hover { border-color: rgba(201,168,76,0.4); box-shadow: var(--glow-gold); }
    .tech-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    }
    .hex-corner {
      position: absolute; width: 24px; height: 24px; opacity: 0.12; pointer-events: none;
      border: 1px solid #C9A84C;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .hex-corner.tl { top: 8px; left: 8px; }
    .hex-corner.br { bottom: 8px; right: 8px; }
    .tech-card-header {
      display: flex; align-items: center; gap: var(--space-md);
      margin-bottom: var(--space-md); padding-bottom: var(--space-sm);
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .tech-card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
      border: 1px solid rgba(201,168,76,0.3); background: rgba(201,168,76,0.06);
    }
    .tech-card-title { font-family: var(--font-heading); font-size: 1.15rem; color: #C9A84C; }
    .tech-card-sub { font-size: 0.8rem; color: #8B8577; }

    /* Pillar grid */
    .pillar-grid {
      display: flex; justify-content: center; gap: var(--space-lg); flex-wrap: wrap; margin-top: var(--space-md);
    }
    .pillar-cell { text-align: center; position: relative; }
    .pillar-cell::before {
      content: ''; position: absolute; inset: -8px; border: 1px solid rgba(201,168,76,0.12);
      border-radius: 12px; background: radial-gradient(circle at center, rgba(201,168,76,0.03) 0%, transparent 70%); z-index: -1;
    }
    .pillar-label { font-size: 0.75rem; color: #8B8577; margin-bottom: 4px; letter-spacing: 0.1em; }
    .pillar-gan, .pillar-zhi { font-family: var(--font-heading); font-size: 2rem; font-weight: 700; line-height: 1.2; }
    .pillar-gan { color: #E8E0D4; }
    .pillar-zhi { color: #8B8577; }
    .pillar-cell.highlight .pillar-gan { color: #C9A84C; text-shadow: 0 0 20px rgba(201,168,76,0.5); }
    .pillar-cell.highlight .pillar-zhi { color: #C9A84C; }

    /* Wuxing ring */
    .wuxing-ring { display: flex; justify-content: center; gap: var(--space-md); margin-top: var(--space-md); flex-wrap: wrap; }
    .wuxing-node {
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 600; border: 2px solid transparent;
      transition: all 0.4s; position: relative;
    }
    .wuxing-node::after { content: attr(data-count); position: absolute; bottom: -18px; font-size: 0.7rem; color: #8B8577; }
    .wuxing-node.wood { background: rgba(107,142,35,0.15); border-color: #6B8E23; color: #6B8E23; }
    .wuxing-node.fire { background: rgba(220,53,69,0.15); border-color: #DC3545; color: #DC3545; }
    .wuxing-node.earth { background: rgba(205,133,63,0.15); border-color: #CD853F; color: #CD853F; }
    .wuxing-node.metal { background: rgba(168,169,173,0.15); border-color: #A8A9AD; color: #A8A9AD; }
    .wuxing-node.water { background: rgba(70,130,180,0.15); border-color: #4682B4; color: #4682B4; }

    /* Ziwei Wenmo Tianji grid */
    .zw-wt-container {
      display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
      grid-template-rows: auto auto auto auto;
      gap: 4px;
      max-width: 640px; margin: 0 auto;
    }
    .zw-wt-cell {
      background: rgba(17,21,30,0.92); border: 1px solid rgba(201,168,76,0.15);
      border-radius: 6px; padding: 10px 8px; text-align: center;
      min-height: 78px; display: flex; flex-direction: column; justify-content: center;
      position: relative; transition: all 0.3s;
    }
    .zw-wt-cell.ming { border-color: rgba(201,168,76,0.55); background: rgba(201,168,76,0.07); }
    .zw-wt-cell.shen { border-color: rgba(74,158,139,0.55); background: rgba(74,158,139,0.07); }
    .zw-wt-cell .zw-branch { font-size: 0.65rem; color: #5a5a5a; position: absolute; top: 3px; left: 6px; }
    .zw-wt-cell .zw-pname { font-size: 0.9rem; color: #C9A84C; font-weight: 700; margin-bottom: 2px; }
    .zw-wt-cell .zw-stars { font-size: 0.82rem; color: #E8E0D4; font-weight: 500; line-height: 1.3; }
    .zw-wt-cell .zw-stars .si-hua { font-size: 0.7rem; margin-left: 2px; }
    .zw-wt-cell .zw-stars .si-hua.lu { color: #4A9E8B; }
    .zw-wt-cell .zw-stars .si-hua.quan { color: #C9A84C; }
    .zw-wt-cell .zw-stars .si-hua.ke { color: #6B5B95; }
    .zw-wt-cell .zw-stars .si-hua.ji { color: #C75B5B; }
    .zw-wt-empty {
      background: rgba(13,17,23,0.6); border: 1px solid rgba(201,168,76,0.05);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      color: #2a2a2a; font-family: serif; font-size: 1.5rem;
    }
    @media (max-width: 500px) {
      .zw-wt-container { max-width: 100%; }
      .zw-wt-cell { padding: 6px 4px; min-height: 60px; }
      .zw-wt-cell .zw-pname { font-size: 0.75rem; }
      .zw-wt-cell .zw-stars { font-size: 0.68rem; }
    }

    /* Life stages */
    .stage-tabs { display: flex; gap: 6px; margin-bottom: var(--space-md); flex-wrap: wrap; }
    .stage-tab {
      padding: 6px 16px; border-radius: 100px; border: 1px solid rgba(201,168,76,0.2);
      background: transparent; color: #8B8577; cursor: pointer; font-size: 0.85rem;
      transition: all 0.3s;
    }
    .stage-tab:hover { border-color: rgba(201,168,76,0.4); color: #C9A84C; }
    .stage-tab.active { background: rgba(201,168,76,0.1); border-color: #C9A84C; color: #C9A84C; }
    .stage-content { display: none; animation: panelFadeIn 0.3s ease; }
    .stage-content.active { display: block; }

    /* Ripple */
    .ripple-bar {
      height: 4px; border-radius: 2px; margin-bottom: var(--space-sm);
      background: rgba(201,168,76,0.06); position: relative; overflow: hidden;
    }
    .ripple-bar::after {
      content: ''; position: absolute; top: 0; left: 0; height: 100%; border-radius: 2px;
      animation: rippleFlow 2s ease infinite;
    }
    .ripple-bar.gold::after { background: linear-gradient(90deg, transparent, #C9A84C, transparent); }
    .ripple-bar.jade::after { background: linear-gradient(90deg, transparent, #4A9E8B, transparent); animation-delay: 0.5s; }
    .ripple-bar.red::after  { background: linear-gradient(90deg, transparent, #C75B5B, transparent); animation-delay: 1s; }
    @keyframes rippleFlow {
      0% { left: -50%; width: 30%; } 60% { left: 100%; width: 30%; } 100% { left: 100%; width: 0; }
    }

    /* Gua decoration */
    .gua-decoration { display: flex; gap: 6px; justify-content: center; margin: var(--space-md) 0; }
    .gua-line { width: 40px; height: 3px; border-radius: 2px; opacity: 0.2; }
    .gua-line.yang { background: #C9A84C; width: 40px; }
    .gua-line.yin { display: flex; gap: 3px; }
    .gua-line.yin span { flex: 1; height: 3px; background: #C9A84C; border-radius: 2px; }

    @keyframes taijiSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Photo placeholder */
    .photo-placeholder {
      text-align: center; padding: 3rem 1.5rem;
      background: linear-gradient(135deg, rgba(26,31,46,0.5), rgba(13,17,23,0.7));
      border: 1px dashed rgba(201,168,76,0.25); border-radius: 12px;
    }
    .photo-placeholder .icon { font-size: 3rem; opacity: 0.4; margin-bottom: var(--space-sm); }
  </style>
</head>
<body>
<div class="tech-overlay"></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">道器</a>
    <a href="checkout.html" class="btn btn-primary">预约专家</a>
  </div>
</nav>

<main class="report-page">
  <!-- Header -->
  <header class="report-header" style="text-align:center;">
    <h1 id="reportTitle" style="font-family:var(--font-heading);font-size:2rem;color:#E8E0D4;">道器 · 命理推演</h1>
    <p style="color:#8B8577;margin-bottom:var(--space-md);" id="reportLocation"></p>
    <div class="gua-decoration" id="guaDeco"></div>
    <div class="pillar-grid" id="baziDisplay">
      <div class="pillar-cell"><div class="pillar-label">年柱</div><div class="pillar-gan" id="yearGan">—</div><div class="pillar-zhi" id="yearZhi">—</div></div>
      <div class="pillar-cell"><div class="pillar-label">月柱</div><div class="pillar-gan" id="monthGan">—</div><div class="pillar-zhi" id="monthZhi">—</div></div>
      <div class="pillar-cell highlight"><div class="pillar-label">日柱</div><div class="pillar-gan" id="dayGan">—</div><div class="pillar-zhi" id="dayZhi">—</div></div>
      <div class="pillar-cell"><div class="pillar-label">时柱</div><div class="pillar-gan" id="hourGan">—</div><div class="pillar-zhi" id="hourZhi">—</div></div>
    </div>
    <div class="wuxing-ring" id="wuxingRing"></div>
    <div style="margin-top:var(--space-md);">
      <div class="ripple-bar gold" style="width:60%;margin:0 auto;"></div>
      <div class="ripple-bar jade" style="width:40%;margin:4px auto;"></div>
      <div class="ripple-bar red" style="width:30%;margin:4px auto;"></div>
    </div>
    <div id="strengthBadge" style="margin-top:var(--space-sm);"></div>
  </header>

  <!-- Tab Nav -->
  <nav class="tab-nav">
    <div class="tab-nav-inner">
      <button class="tab-btn active" data-panel="bazi">☯ 命盘总览</button>
      <button class="tab-btn" data-panel="ziwei">⭐ 紫微斗数</button>
      <button class="tab-btn" data-panel="mianxiang">👁 面相分析</button>
      <button class="tab-btn" data-panel="shouxiang">✋ 手相分析</button>
      <button class="tab-btn" data-panel="fengshui">🏠 风水布局</button>
      <button class="tab-btn" data-panel="liunian">📅 流年运势</button>
    </div>
  </nav>

  <!-- Panels -->
  <div class="report-sections" style="max-width:1100px;margin:0 auto;padding:0 var(--space-md);">
    <div id="loadingIndicator" style="text-align:center;padding:4rem 0;">
      <div style="width:60px;height:60px;margin:0 auto;border:2px solid rgba(201,168,76,0.2);border-top-color:#C9A84C;border-radius:50%;animation:taijiSpin 2s linear infinite;"></div>
      <p style="color:#C9A84C;font-size:1.2rem;margin-top:var(--space-md);">推演中，接通天地之气……</p>
      <p style="color:#8B8577;">请稍候</p>
    </div>
    <div class="tab-panel active" id="panel-bazi"></div>
    <div class="tab-panel" id="panel-ziwei"></div>
    <div class="tab-panel" id="panel-mianxiang"></div>
    <div class="tab-panel" id="panel-shouxiang"></div>
    <div class="tab-panel" id="panel-fengshui"></div>
    <div class="tab-panel" id="panel-liunian"></div>
    <div id="expertCTA" style="margin-top:var(--space-xl);"></div>
  </div>
</main>

<footer class="footer" style="margin-top:var(--space-xl);">
  <div class="container"><p class="footer-copy">© 2026 道器命理 · 紫微斗数 · 四柱八字 · 仅供参考</p></div>
</footer>

<script>
// ===== GUARD: 必须从表单页进入 =====
const birthData = JSON.parse(sessionStorage.getItem('birthData') || 'null');
if (!birthData || !birthData.name || !birthData.year) {
  window.location.replace('form.html');
  throw new Error('redirect');
}

const IS_TESTING = false;
const hasFacePhoto = sessionStorage.getItem('hasFacePhoto') === 'true';
const hasPalmPhoto = sessionStorage.getItem('hasPalmPhoto') === 'true';
const userLocation = birthData.location || '';
let baziResult = null;

async function loadReport() {
  const loading = document.getElementById('loadingIndicator');
  try {
    const params = new URLSearchParams();
    params.set('name', birthData.name);
    params.set('gender', birthData.gender || 'male');
    params.set('year', birthData.year);
    params.set('month', birthData.month);
    params.set('day', birthData.day);
    params.set('hour', birthData.hour || '子时');
    params.set('calendar', birthData.calendar || 'solar');

    // Timeout + AbortController wrapper
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 20000);
    const timeout = (ms, promise) => {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('请求超时（' + (ms/1000) + '秒），请检查网络后重试')), ms);
        promise.then(r => { clearTimeout(timer); resolve(r); }).catch(e => { clearTimeout(timer); reject(e); });
      });
    };

    // Try relative path first (same origin), then absolute URL
    const paths = ['/api/bazi?', window.location.origin + '/api/bazi?'];
    let resp, lastErr;
    for (const base of paths) {
      try {
        resp = await Promise.race([
          fetch(base + params.toString(), { signal: controller.signal }),
          new Promise((_, reject) => setTimeout(() => reject(new Error('网络超时（20秒）')), 20000))
        ]);
        if (resp.ok) break;
        lastErr = 'HTTP ' + resp.status;
      } catch (e) {
        lastErr = e.name === 'AbortError' ? '请求超时' : e.message;
      }
    }
    clearTimeout(timeoutId);
    if (!resp || !resp.ok) throw new Error('API连接失败: ' + lastErr + '，请返回重新填写');
    const text = await resp.text();
    try { baziResult = JSON.parse(text); } catch { throw new Error('数据解析失败，请稍后重试'); }
    if (baziResult.error) throw new Error('排盘失败：' + baziResult.error);
    if (loading) loading.remove();
    renderHeader();
    renderAllTabs();
    initTabs();
    lucide.createIcons();
  } catch (err) {
    console.error('loadReport error:', err);
    const msg = err.message || String(err);
    if (loading) loading.innerHTML = '<div style="max-width:480px;margin:0 auto;text-align:center;padding:2rem 1rem;">' +
      '<div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>' +
      '<h3 style="color:#C9A84C;margin-bottom:0.8rem;">加载失败</h3>' +
      '<p style="color:#8B8577;font-size:0.9rem;line-height:1.6;">' + msg + '</p>' +
      '<div style="margin-top:1.2rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">' +
      '<button onclick="location.reload()" style="padding:8px 20px;border-radius:8px;background:rgba(201,168,76,0.1);color:#C9A84C;border:1px solid rgba(201,168,76,0.3);cursor:pointer;">重新加载</button>' +
      '<a href="form.html" style="padding:8px 20px;border-radius:8px;background:rgba(201,168,76,0.1);color:#C9A84C;border:1px solid rgba(201,168,76,0.3);text-decoration:none;">返回填写</a>' +
      '</div></div>';
  }
}

// ===== Header =====
function renderHeader() {
  const d = baziResult;
  const p = d.pillars;
  document.getElementById('reportTitle').textContent = d.name + ' · 命理报告';
  document.getElementById('reportLocation').innerHTML = userLocation
    ? `<span style="font-size:0.85rem;">📍 ${userLocation} · ${birthData.year}年${birthData.month}月${birthData.day}日 ${birthData.hour}</span>`
    : `<span style="font-size:0.85rem;">${birthData.year}年${birthData.month}月${birthData.day}日 ${birthData.hour}</span>`;

  document.getElementById('yearGan').textContent = p.year[0];
  document.getElementById('yearZhi').textContent = p.year[1];
  document.getElementById('monthGan').textContent = p.month[0];
  document.getElementById('monthZhi').textContent = p.month[1];
  document.getElementById('dayGan').textContent = p.day[0];
  document.getElementById('dayZhi').textContent = p.day[1];
  document.getElementById('hourGan').textContent = p.hour[0];
  document.getElementById('hourZhi').textContent = p.hour[1];

  const wc = d.wuxingCount;
  const wnn = { '金':'metal','木':'wood','水':'water','火':'fire','土':'earth' };
  const ring = document.getElementById('wuxingRing');
  ring.innerHTML = '';
  for (const [k, v] of Object.entries(wnn)) {
    const cnt = wc[k] || 0;
    const opacity = 0.3 + (cnt / 8) * 0.7;
    ring.innerHTML += `<div class="wuxing-node ${v}" data-count="${cnt}" style="opacity:${opacity}">${k}</div>`;
  }

  const s = d.strength;
  const sc = s.includes('强') ? '#C75B5B' : s.includes('弱') ? '#4A9E8B' : '#C9A84C';
  document.getElementById('strengthBadge').innerHTML = `<span style="display:inline-block;padding:0.3rem 1.2rem;border-radius:100px;font-size:0.9rem;background:${sc}15;color:${sc};border:1px solid ${sc}30;">日主 ${d.dayMaster}${d.dayWuxing} · ${s}</span>`;

  const guas = ['111111','000000','111010','010111','101010','110011','001100','100010'];
  const gArr = (guas[Math.floor(Math.random() * guas.length)]).split('');
  let gHtml = '';
  for (const l of gArr) {
    if (l === '1') gHtml += '<div class="gua-line yang"></div>';
    else gHtml += '<div class="gua-line yin"><span></span><span></span></div>';
  }
  document.getElementById('guaDeco').innerHTML = gHtml;
}

// ===== Render all tabs =====
function renderAllTabs() {
  const d = baziResult;
  document.getElementById('panel-bazi').innerHTML = buildBaziPanel(d);
  document.getElementById('panel-ziwei').innerHTML = buildZiweiPanel(d);
  document.getElementById('panel-mianxiang').innerHTML = hasFacePhoto ? buildMianXiangPanel(d) : buildPhotoPlaceholder('面相', 'face');
  document.getElementById('panel-shouxiang').innerHTML = hasPalmPhoto ? buildShouXiangPanel(d) : buildPhotoPlaceholder('手相', 'palm');
  document.getElementById('panel-fengshui').innerHTML = buildFengshuiPanel(d);
  document.getElementById('panel-liunian').innerHTML = buildLiunianPanel(d);
  document.getElementById('expertCTA').innerHTML = buildExpertCTA();
}

function buildPhotoPlaceholder(type, key) {
  const icon = key === 'face' ? '👁' : '✋';
  const desc = key === 'face' ? '面相照片' : '手相照片';
  return `<div class="tech-card">
    <div class="hex-corner tl"></div><div class="hex-corner br"></div>
    <div class="photo-placeholder">
      <div class="icon">${icon}</div>
      <h3 style="color:#C9A84C;margin-bottom:var(--space-sm);">请上传${desc}以解锁${type}分析</h3>
      <p style="color:#8B8577;max-width:400px;margin:0 auto;font-size:0.9rem;">

function initTabs() {
  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
      setTimeout(() => lucide.createIcons(), 100);
    });
  });
}

      ['🧘 心态','' + (isStrong?'历尽千帆，云淡风轻，每一天都从容自在。':'随遇而安，岁月静好，内心丰盈胜过一切。')],
      ['⚠️ 注意','此阶段以"安"为第一要义——安全、安心、安宁。家人陪伴和关怀比任何药物都珍贵。']
    ]}
  ];

  let html = '<div class="stage-tabs">';
  stages.forEach((s, i) => {
    html += '<button class="stage-tab' + (i===0?' active':'') + '" data-stage="' + i + '" onclick="switchStage(' + i + ')">' + s.name + '<br><span style="font-size:0.65rem;opacity:0.7;">' + s.age + '</span></button>';
  });
  html += '</div>';
  stages.forEach((s, i) => {
    html += '<div class="stage-content' + (i===0?' active':'') + '" id="stage-' + i + '">';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;">';

      html += '<div style="padding:10px 12px;background:rgba(26,31,46,0.5);border-radius:8px;border-left:2px solid #C9A84C;">' +

        '<p style="font-size:0.85rem;line-height:1.6;color:#C8C0B8;margin:0;">' + it[1] + '</p></div>';
    });
    html += '</div></div>';
  });
  return html;
}
function switchStage(idx) {
  document.querySelectorAll('.stage-tab').forEach(function(b, i) { b.classList.toggle('active', i === idx); });
  document.querySelectorAll('.stage-content').forEach(function(c, i) {
    c.classList.toggle('active', i === idx);
    c.style.display = i === idx ? 'block' : 'none';
  });
}

function buildZiweiPanel(d) {
  const zw = d.ziwei;

  // Build Wenmo Tianji style grid using palaceDetails
  const rawBranches = ['巳','午','未','申','辰','酉','卯','戌','寅','丑','子','亥'];
  const branchPalaceMap = {};
  const pd = zw.palaceDetails || {};
  const mingIdx2 = ZW_PALACES.indexOf(zw.mingPalace);
  for (let i = 0; i < 12; i++) {
    const pname = ZW_PALACES[(mingIdx2 + i) % 12];
    branchPalaceMap[rawBranches[i]] = { name: pname, details: pd[pname] || {} };
  }

  let gridHtml = '<div class="zw-wt-container">';
  const positions = [
    { branch:'巳' }, { branch:'午' }, { branch:'未' }, { branch:'申' },
    { branch:'辰' }, { empty:true }, { empty:true }, { branch:'酉' },
    { branch:'卯' }, { empty:true }, { empty:true }, { branch:'戌' },
    { branch:'寅' }, { branch:'丑' }, { branch:'子' }, { branch:'亥' },
  ];
  const briColors = { '庙':'#FFD700','旺':'#FFA500','得':'#4A9E8B','利':'#87CEEB','平':'#A0A0A0','陷':'#C75B5B' };
  const siHuaLabels = { 'lu':'化禄','quan':'化权','ke':'化科','ji':'化忌' };
  const siHuaColors = { 'lu':'#4A9E8B','quan':'#C9A84C','ke':'#6B5B95','ji':'#C75B5B' };

  positions.forEach(function(pos) {
    if (pos.empty) {
      gridHtml += '<div class="zw-wt-empty">☯</div>';
    } else {
      var info = branchPalaceMap[pos.branch] || {};
      var detail = info.details || {};
      var isMing = info.name === zw.mingPalace;
      var isShen = info.name === zw.shenPalace;
      var cls = '';
      if (isMing) cls += ' ming';
      if (isShen) cls += ' shen';

      var starsHtml = '';
      var mainStars = detail.mainStars || [];
      var brightness = detail.mainStarBrightness || {};
      var siHuas = detail.siHuas || [];
      var luckyStars = detail.luckyStars || [];
      var fierceStars = detail.fierceStars || [];

      mainStars.forEach(function(s) {
        var bri = brightness[s] || '平';
        starsHtml += '<span>' + s + '<sup style="font-size:0.6rem;color:' + (briColors[bri]||'#A0A0A0') + ';">' + bri + '</sup></span><br>';
      });
      if (siHuas.length > 0) {
        var shText = siHuas.map(function(sh) {
          return '<span class="si-hua ' + sh.type + '" style="color:' + (siHuaColors[sh.type]||'#C9A84C') + ';">' + (siHuaLabels[sh.type]||sh.type) + '</span>';
        }).join(' ');
        starsHtml += '<span style="font-size:0.68rem;">' + shText + '</span><br>';
      }
      if (luckyStars.length > 0) {
        starsHtml += '<span style="font-size:0.65rem;color:#4A9E8B;">' + luckyStars.join(' ') + '</span><br>';
      }
      if (fierceStars.length > 0) {
        starsHtml += '<span style="font-size:0.65rem;color:#C75B5B;">' + fierceStars.join(' ') + '</span><br>';
      }
      if (!starsHtml) starsHtml = '<span style="color:#3a3a3a;">—</span>';

      gridHtml += '<div class="zw-wt-cell' + cls + '">' +
        '<span class="zw-branch">' + pos.branch + '</span>' +
        '<div class="zw-pname">' + (info.name || '') + '</div>' +
        '<div class="zw-stars">' + starsHtml + '</div>' +
      '</div>';
    }
  });
  gridHtml += '</div>';

  // Key palace analysis - use richer data
  var keyHtml = '';
  var ka = zw.keyAnalysis || {};
  for (var palace in ka) {
    if (ka.hasOwnProperty(palace)) {
      keyHtml += '<div style="padding:10px 12px;background:rgba(26,31,46,0.5);border-radius:8px;margin-bottom:6px;font-size:0.9rem;">' +
        '<strong style="color:#C9A84C;">' + palace + '</strong>' +
        '<p style="margin-top:4px;line-height:1.6;">' + ka[palace] + '</p></div>';
    }
  }

  const mingStars = zw.mingStars.length ? zw.mingStars.join('、') : '无主星';
  const shenStars = zw.shenStars.length ? zw.shenStars.join('、') : '无主星';

  return `
    ${techCard('compass', '命身宫', '紫微斗数核心',
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);">
        <div style="padding:var(--space-md);background:rgba(201,168,76,0.05);border-radius:8px;border:1px solid rgba(201,168,76,0.2);text-align:center;">
          <div style="font-size:0.8rem;color:#8B8577;">命宫</div>
          <div style="font-size:1.5rem;color:#C9A84C;font-family:var(--font-heading);">${zw.mingPalace}</div>
          <div style="color:#C9A84C;font-weight:500;">主星：${mingStars}</div>
          <div style="margin-top:8px;font-size:0.9rem;line-height:1.6;">${zw.mingInterpret}</div>
        </div>
        <div style="padding:var(--space-md);background:rgba(74,158,139,0.05);border-radius:8px;border:1px solid rgba(74,158,139,0.2);text-align:center;">
          <div style="font-size:0.8rem;color:#8B8577;">身宫</div>
          <div style="font-size:1.5rem;color:#4A9E8B;font-family:var(--font-heading);">${zw.shenPalace}</div>
          <div style="color:#4A9E8B;font-weight:500;">主星：${shenStars}</div>
          <div style="margin-top:8px;font-size:0.9rem;line-height:1.6;">${zw.shenInterpret}</div>
        </div>
      </div>
      <div style="margin-top:var(--space-md);text-align:center;">
        <span style="display:inline-block;padding:var(--space-xs) var(--space-md);background:rgba(201,168,76,0.06);border-radius:100px;">
          五行局：<strong style="color:#C9A84C;">${zw.wuxingJu}</strong> · 紫微在 <strong style="color:#C9A84C;">${zw.ziweiPosition}</strong>
        </span>
      </div>`)}

    ${techCard('globe', '紫微命盘 · 文墨天机式', '十二宫星辰飞布 · 庙旺得利平陷',
      gridHtml + `<div style="display:flex;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap;font-size:0.72rem;color:#8B8577;">
        <span><span style="color:#FFD700;">●</span> 庙</span><span><span style="color:#FFA500;">●</span> 旺</span>
        <span><span style="color:#4A9E8B;">●</span> 得</span><span><span style="color:#87CEEB;">●</span> 利</span>
        <span><span style="color:#A0A0A0;">●</span> 平</span><span><span style="color:#C75B5B;">●</span> 陷</span>
      </div>`)}

    ${techCard('target', '重点宫位解读', '关键人生领域', keyHtml)}
  `;
}
