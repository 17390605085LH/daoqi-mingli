<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg"><title>命理报告 · 道器</title>
  <meta name="description" content="您的专属命理分析报告。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">道器</a>
    <a href="checkout.html" class="btn btn-primary">解锁完整报告</a>
  </div>
</nav>

<main class="report-page">
  <header class="report-header" id="reportHeader">
    <h1 id="reportTitle">命理报告</h1>
    <p>基于道器排盘引擎 + 经典典籍双重支持</p>

    <div class="bazi-display" id="baziDisplay">
      <div class="bazi-pillar"><div class="bazi-pillar-label">年柱</div><div class="bazi-gan" id="yearGan">-</div><div class="bazi-zhi" id="yearZhi">-</div></div>
      <div class="bazi-pillar"><div class="bazi-pillar-label">月柱</div><div class="bazi-gan" id="monthGan">-</div><div class="bazi-zhi" id="monthZhi">-</div></div>
      <div class="bazi-pillar"><div class="bazi-pillar-label">日柱</div><div class="bazi-gan" id="dayGan">-</div><div class="bazi-zhi" id="dayZhi">-</div></div>
      <div class="bazi-pillar"><div class="bazi-pillar-label">时柱</div><div class="bazi-gan" id="hourGan">-</div><div class="bazi-zhi" id="hourZhi">-</div></div>
    </div>

    <div class="wuxing-indicator" id="wuxingIndicator">
      <span class="wuxing-dot wood" title="木">木</span>
      <span class="wuxing-dot fire" title="火">火</span>
      <span class="wuxing-dot earth" title="土">土</span>
      <span class="wuxing-dot metal" title="金">金</span>
      <span class="wuxing-dot water" title="水">水</span>
    </div>

    <div id="strengthBadge" style="margin-top:var(--space-md);"></div>
  </header>

  <div class="report-sections" id="reportSections">
    <!-- 所有内容由 JS 动态生成 -->
    <div id="loadingIndicator" style="text-align:center;padding:3rem 0;">
      <p style="color:var(--color-gold);font-size:1.2rem;">正在排盘推演中……</p>
      <p style="color:var(--color-text-muted);">请稍候</p>
    </div>
  </div>
</main>

<footer class="footer" style="margin-top:var(--space-xl);">
  <div class="container"><p class="footer-copy">© 2026 道器命理 · 仅供参考</p></div>
</footer>

<script>
// ===== 核心：从 sessionStorage 读取数据并调用 API =====
const birthData = JSON.parse(sessionStorage.getItem('birthData') || '{}');
const urlParams = new URLSearchParams(window.location.search);
const plan = urlParams.get('plan') || 'free';

let baziResult = null;

async function loadReport() {
  const loading = document.getElementById('loadingIndicator');

  try {
    // 构建 API 请求参数
    const params = new URLSearchParams();
    if (birthData.name) {
      params.set('name', birthData.name);
      params.set('gender', birthData.gender || 'male');
      params.set('year', birthData.year);
      params.set('month', birthData.month);
      params.set('day', birthData.day);
      params.set('hour', birthData.hour || '子时');
      params.set('calendar', birthData.calendar || 'solar');
    } else {
      // 没有用户数据，用当前日期生成 demo
      const now = new Date();
      params.set('name', '访客');
      params.set('year', now.getFullYear());
      params.set('month', now.getMonth() + 1);
      params.set('day', now.getDate());
      params.set('hour', '子时');
    }

    const resp = await fetch('/api/bazi?' + params.toString());
    baziResult = await resp.json();

    if (loading) loading.remove();

    // 渲染所有内容
    renderBaziDisplay();
    renderAllSections();

    // 初始化图标
    lucide.createIcons();

  } catch (err) {
    if (loading) {
      loading.innerHTML = '<p style="color:var(--color-cinnabar);">数据加载失败，请返回重新填写</p><a href="form.html" class="btn btn-primary" style="margin-top:1rem;">返回填写</a>';
    }
  }
}

// ===== 渲染八字展示 =====
function renderBaziDisplay() {
  const p = baziResult.pillars;
  document.getElementById('reportTitle').textContent = baziResult.name + ' · 命理报告';
  document.getElementById('yearGan').textContent = p.year[0];
  document.getElementById('yearZhi').textContent = p.year[1];
  document.getElementById('monthGan').textContent = p.month[0];
  document.getElementById('monthZhi').textContent = p.month[1];
  document.getElementById('dayGan').textContent = p.day[0];
  document.getElementById('dayZhi').textContent = p.day[1];
  document.getElementById('hourGan').textContent = p.hour[0];
  document.getElementById('hourZhi').textContent = p.hour[1];

  // 日柱高亮
  document.getElementById('dayGan').style.color = 'var(--color-gold)';
  document.getElementById('dayZhi').style.color = 'var(--color-gold)';

  // 五行指示器数量
  const wc = baziResult.wuxingCount;
  const maxCount = Math.max(wc.金, wc.木, wc.水, wc.火, wc.土, 1);
  const indicator = document.getElementById('wuxingIndicator');
  const dots = indicator.querySelectorAll('.wuxing-dot');
  const wuxingKeys = ['wood', 'fire', 'earth', 'metal', 'water'];
  const wuxingNames = ['木', '火', '土', '金', '水'];

  dots.forEach((dot, i) => {
    const count = wc[wuxingNames[i]] || 0;
    const opacity = 0.3 + (count / maxCount) * 0.7;
    dot.style.opacity = opacity;
    dot.title = wuxingNames[i] + ': ' + count;
  });

  // 强弱标记
  const badge = document.getElementById('strengthBadge');
  const s = baziResult.strength;
  const sc = s.includes('强') ? 'var(--color-cinnabar)' : s.includes('弱') ? 'var(--color-jade)' : 'var(--color-gold)';
  badge.innerHTML = `<span style="display:inline-block;padding:0.25rem 1rem;border-radius:100px;font-size:0.85rem;background:${sc}15;color:${sc};border:1px solid ${sc}30;">日主${baziResult.dayMaster}${baziResult.dayWuxing} · ${s}</span>`;
}

// ===== 渲染所有卡片 =====
function renderAllSections() {
  const container = document.getElementById('reportSections');
  const d = baziResult;
  const isFree = (plan === 'free' || plan === '尝鲜版');

  const cards = [];

  // 1. 五行分析
  cards.push(buildWuxingCard(d));

  // 2. 日主性格（免费可见全貌）
  cards.push(buildPersonalityCard(d));

  // 3. 十神关系（免费可见）
  cards.push(buildShiShenCard(d));

  // 4. 喜用神
  cards.push(buildYongShenCard(d));

  // 5. 大运（付费内容）
  cards.push(buildDayunCard(d, isFree));

  // 6. 流年分析（付费内容部分展示）
  cards.push(buildLiunianCard(d, isFree));

  // 7. 流月简析
  cards.push(buildMonthlyCard(d));

  // 8. 趋吉避凶
  cards.push(buildJixiongCard(d));

  // 9. 紫微斗数
  cards.push(buildZiweiCard(d, isFree));

  // 10. 面相分析
  cards.push(buildMianXiangCard(d, isFree));

  // 11. 手相分析
  cards.push(buildShouXiangCard(d, isFree));

  // 12. 风水布局
  cards.push(buildFengshuiCard(d, isFree));

  // 13. 山医堂主
  cards.push(buildExpertCard());

  // 14. 升级 CTA
  if (isFree) {
    cards.push(buildUpgradeCard());
  }

  container.innerHTML = cards.join('');
}

// ===== 各卡片构建函数 =====

function buildWuxingCard(d) {
  const wc = d.wuxingCount;
  const maxVal = Math.max(wc.金, wc.木, wc.水, wc.火, wc.土, 1);
  const wm = { '金':'metal','木':'wood','水':'water','火':'fire','土':'earth' };
  const wn = { '金':'金','木':'木','水':'水','火':'火','土':'土' };

  let bars = '';
  for (const [k, v] of Object.entries(wn)) {
    const pct = Math.round((wc[v] / maxVal) * 100);
    const colorVar = `var(--color-${wm[k]})`;
    bars += `<div style="display:flex;align-items:center;gap:var(--space-xs);margin-bottom:var(--space-sm);">
      <span style="width:24px;font-size:0.85rem;font-weight:600;color:${colorVar};">${k}</span>
      <div style="flex:1;height:20px;background:var(--color-ink);border-radius:4px;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:${colorVar};border-radius:4px;transition:width 0.6s;"></div>
      </div>
      <span style="font-size:0.85rem;color:var(--color-text-muted);">${wc[v]}</span>
    </div>`;
  }

  const analysis = generateWuxingText(d);

  return cardTemplate('flame', '五行分布分析', '天干地支与五行力量', bars + `
    <p style="margin-top:var(--space-md);">${analysis}</p>
    <div style="margin-top:var(--space-md);padding:var(--space-md);background:rgba(201,168,76,0.05);border-radius:var(--radius-sm);border-left:3px solid var(--color-gold);">
      <strong style="color:var(--color-gold);">${d.yongShen.principle}</strong>
      <p style="margin-top:var(--space-xs);">用神：${d.yongShen.yongShen}，忌：${d.yongShen.avoid}</p>
    </div>`, true);
}

function buildPersonalityCard(d) {
  const p = d.personality;
  let pos = '', neg = '';
  p.positive.forEach(t => { pos += `<li>✓ ${t}</li>`; });
  p.negative.forEach(t => { neg += `<li>⚠ ${t}</li>`; });

  return cardTemplate('user', '日主性格', `日主${d.dayMaster}${d.dayWuxing} · ${d.strength}`,
    `<p>日主<span style="color:var(--color-gold);font-weight:600;">${d.dayMaster}${d.dayWuxing}</span>，${d.strength}。</p>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-md);margin-top:var(--space-md);">
      <div style="padding:var(--space-md);background:var(--color-ink);border-radius:var(--radius-sm);">
        <div style="font-size:0.85rem;color:var(--color-jade);margin-bottom:var(--space-xs);">优势特质</div>
        <ul style="list-style:none;">${pos}</ul>
      </div>
      <div style="padding:var(--space-md);background:var(--color-ink);border-radius:var(--radius-sm);">
        <div style="font-size:0.85rem;color:var(--color-cinnabar);margin-bottom:var(--space-xs);">需注意</div>
        <ul style="list-style:none;">${neg}</ul>
      </div>
    </div>`, true);
}

function buildShiShenCard(d) {
  const ss = d.shiShen;
  const pillarNames = { year: '年柱', month: '月柱', day: '日柱', hour: '时柱' };
  let rows = '';
  for (const [key, val] of Object.entries(ss)) {
    rows += `<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-sm);background:var(--color-ink);border-radius:var(--radius-sm);margin-bottom:var(--space-xs);">
      <span style="color:var(--color-text-muted);">${pillarNames[key] || key}</span>
      <span style="font-weight:600;color:var(--color-gold);">${val[0]}</span>
      <span style="font-size:0.85rem;color:var(--color-text-muted);">${val[1]}</span>
    </div>`;
  }
  return cardTemplate('git-branch', '十神关系', '天干之间的生克关系', rows, true);
}

function buildYongShenCard(d) {
  const g = d.luckyGuide;
  return cardTemplate('star', '喜用神与幸运指南', d.yongShen.principle,
    `<p style="margin-bottom:var(--space-md);"><span style="color:var(--color-gold);font-weight:600;">用神：${d.yongShen.yongShen}</span></p>
    <p style="margin-bottom:var(--space-md);"><span style="color:var(--color-cinnabar);">忌神：${d.yongShen.avoid}</span></p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-sm);">
      <div style="text-align:center;padding:var(--space-sm);background:var(--color-ink);border-radius:var(--radius-sm);">
        <div style="font-size:1.5rem;">🧭</div>
        <div style="font-size:0.8rem;color:var(--color-text-muted);margin-top:0.25rem;">幸运方位</div>
        <div style="font-weight:600;">${g.directions.join(' / ')}</div>
      </div>
      <div style="text-align:center;padding:var(--space-sm);background:var(--color-ink);border-radius:var(--radius-sm);">
        <div style="font-size:1.5rem;">🎨</div>
        <div style="font-size:0.8rem;color:var(--color-text-muted);margin-top:0.25rem;">幸运颜色</div>
        <div style="font-weight:600;">${g.colors.join(' / ')}</div>
      </div>
      <div style="text-align:center;padding:var(--space-sm);background:var(--color-ink);border-radius:var(--radius-sm);">
        <div style="font-size:1.5rem;">🔢</div>
        <div style="font-size:0.8rem;color:var(--color-text-muted);margin-top:0.25rem;">幸运数字</div>
        <div style="font-weight:600;">${g.numbers.join(', ')}</div>
      </div>
    </div>
    <div style="margin-top:var(--space-md);padding:var(--space-md);background:rgba(74,158,139,0.08);border-radius:var(--radius-sm);">
      <strong style="color:var(--color-jade);">适合行业</strong>
      <p style="margin-top:var(--space-xs);">${g.industries.join('、')}</p>
    </div>`, true);
}

function buildDayunCard(d, isFree) {
  const content = `<p>大运十年一转，顺逆交替。您的命局行运遵循<span style="color:var(--color-gold);">阳年男顺排/阴年女逆排</span>规则。</p>
    <p style="margin-top:var(--space-sm);">精确大运起运年龄需结合出生日期与节气时间差计算，完整分析包含：</p>
    <ul style="margin-top:var(--space-sm);list-style:disc;padding-left:var(--space-md);">
      <li>起运年龄与换运节点</li>
      <li>每步大运十年吉凶</li>
      <li>大运与命局互动</li>
    </ul>`;

  if (isFree) {
    return cardTemplate('trending-up', '十年大运', '人生各阶段走势',
      content + `<div class="lock-overlay" style="margin-top:var(--space-md);">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-gold)" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <p>升级完整报告 · 解锁十年大运详细解读</p>
        <a href="checkout.html" class="btn btn-primary" style="margin-top:0.75rem;">解锁完整报告</a>
      </div>`);
  }
  return cardTemplate('trending-up', '十年大运', '人生各阶段走势', content);
}

function buildLiunianCard(d, isFree) {
  const cl = d.currentYearLuck;
  const colors = { '大吉': 'var(--color-jade)', '小吉': 'var(--color-jade)', '平稳': 'var(--color-gold)', '需注意': 'var(--color-cinnabar)', '挑战多': 'var(--color-cinnabar)' };

  const content = `<p style="margin-bottom:var(--space-md);">${cl.year}年<span style="color:var(--color-gold);font-weight:600;">${cl.yearPillar}</span>，总体运势：<span style="color:${colors[cl.overall]};font-weight:600;">${cl.overall}</span></p>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-md);">
      <div style="padding:var(--space-md);background:var(--color-ink);border-radius:var(--radius-sm);">
        <div style="font-size:0.85rem;color:var(--color-text-muted);">事业</div><div style="margin-top:0.25rem;">${cl.career}</div>
      </div>
      <div style="padding:var(--space-md);background:var(--color-ink);border-radius:var(--radius-sm);">
        <div style="font-size:0.85rem;color:var(--color-text-muted);">财运</div><div style="margin-top:0.25rem;">${cl.wealth}</div>
      </div>
      <div style="padding:var(--space-md);background:var(--color-ink);border-radius:var(--radius-sm);">
        <div style="font-size:0.85rem;color:var(--color-text-muted);">感情</div><div style="margin-top:0.25rem;">${cl.love}</div>
      </div>
      <div style="padding:var(--space-md);background:var(--color-ink);border-radius:var(--radius-sm);">
        <div style="font-size:0.85rem;color:var(--color-text-muted);">健康</div><div style="margin-top:0.25rem;">${cl.health}</div>
      </div>
    </div>`;

  if (isFree) {
    content += `<div class="lock-overlay" style="margin-top:var(--space-lg);">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-gold)" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <p>付费版解锁逐年逐月详细解读</p>
      <a href="checkout.html" class="btn btn-primary" style="margin-top:0.75rem;">解锁完整报告</a>
    </div>`;
  }

  return cardTemplate('calendar-days', `${cl.year}年流年分析`, `岁君${cl.yearPillar}对流年影响`, content);
}

function buildMonthlyCard(d) {
  const ml = d.monthlyLuck;
  const colors = { '上升': 'var(--color-jade)', '平稳': 'var(--color-gold)', '波动': 'var(--color-cinnabar)' };
  let months = '';
  for (const m of ml) {
    months += `<div style="padding:var(--space-xs);text-align:center;font-size:0.8rem;background:var(--color-ink);border-radius:var(--radius-sm);"><strong>${m.month}月</strong><br><span style="color:${colors[m.status]};font-size:0.75rem;">${m.status}</span></div>`;
  }
  return cardTemplate('calendar', '流月简析', `${d.currentYearLuck.year}年各月走势`,
    `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-xs);">${months}</div>
    <p style="margin-top:var(--space-md);font-size:0.85rem;color:var(--color-text-muted);">绿色=顺遂月份 · 金色=平稳 · 红色=需要谨慎</p>`);
}

function buildJixiongCard(d) {
  const yw = d.yongShen.yongWuxing;
  const aw = d.yongShen.avoid;
  const g = d.luckyGuide;

  const yiItems = [
    `穿戴${g.colors[0]}色系衣物饰品`,
    `多接近${g.directions[0]}方位`,
    `从事${g.industries.slice(0,2).join('、')}相关行业`,
    `上午（7-11点）做重要决定`,
  ];
  const jiItems = [
    `避免穿戴${g.colors.includes('红色') ? '过于鲜艳的颜色' : '红色系'}衣物`,
    `下午（13-17点）不宜做重大决策`,
    `忌冲动行事、与人争执`,
    `忌长期熬夜`,
  ];

  let yi = '', ji = '';
  yiItems.forEach(t => { yi += `<li style="padding-left:var(--space-md);position:relative;"><span style="position:absolute;left:0;color:var(--color-jade);">✓</span>${t}</li>`; });
  jiItems.forEach(t => { ji += `<li style="padding-left:var(--space-md);position:relative;"><span style="position:absolute;left:0;color:var(--color-cinnabar);">✗</span>${t}</li>`; });

  return cardTemplate('compass', '趋吉避凶建议', '基于命局的行动指南',
    `<div style="margin-bottom:var(--space-md);"><h4 style="color:var(--color-jade);margin-bottom:var(--space-sm);">宜</h4><ul style="list-style:none;display:grid;gap:var(--space-xs);">${yi}</ul></div>
    <div><h4 style="color:var(--color-cinnabar);margin-bottom:var(--space-sm);">忌</h4><ul style="list-style:none;display:grid;gap:var(--space-xs);">${ji}</ul></div>`);
}

// ===== 紫微斗数 =====
function buildZiweiCard(d, isFree) {
  const zw = d.ziwei;
  let starsHtml = '';
  for (const [palace, stars] of Object.entries(zw.allStarsInPalaces)) {
    if (stars.length > 0) {
      starsHtml += `<div style="padding:var(--space-xs);background:var(--color-ink);border-radius:var(--radius-sm);margin-bottom:2px;"><span style="color:var(--color-text-muted);font-size:0.8rem;">${palace}</span> <span style="color:var(--color-gold);">${stars.join(' ')}</span></div>`;
    }
  }

  let keyHtml = '';
  for (const [palace, analysis] of Object.entries(zw.keyAnalysis)) {
    keyHtml += `<div style="padding:var(--space-sm);background:var(--color-ink);border-radius:var(--radius-sm);margin-bottom:var(--space-xs);"><strong style="color:var(--color-gold);">${palace}</strong><br><span style="font-size:0.9rem;">${analysis}</span></div>`;
  }

  const content = `<p><span style="color:var(--color-gold);font-weight:600;">命宫：${zw.mingPalace}</span> · ${zw.mingInterpret}</p>
    <p style="margin-top:var(--space-sm);"><span style="color:var(--color-jade);font-weight:600;">身宫：${zw.shenPalace}</span> · ${zw.shenInterpret}</p>
    <p style="margin-top:var(--space-sm);">五行局：<strong>${zw.wuxingJu}</strong>局 · 紫微在<span style="color:var(--color-gold);">${zw.ziweiPosition}</span></p>

// ===== 五行分析文本生成 =====
function generateWuxingText(d) {
  const wc = d.wuxingCount;
  const maxK = Object.keys(wc).reduce((a, b) => wc[a] > wc[b] ? a : b);
  const minK = Object.keys(wc).reduce((a, b) => wc[a] < wc[b] ? a : b);

  const dw = d.dayWuxing;
  const s = d.strength;

  let text = `命局中<span style="color:var(--color-gold);">${maxK}</span>最旺，<span style="color:var(--color-cinnabar);">${minK}</span>最弱。日主${dw}`;

  if (s.includes('强')) {
    text += '偏强，需用克泄之法平衡。';
    if (d.yongShen.yongWuxing.includes('金')) text += '金可克木泄火，';
    if (d.yongShen.yongWuxing.includes('水')) text += '水可克火润局，';
    if (d.yongShen.yongWuxing.includes('土')) text += '土可泄火生金，';
  } else {
    text += '偏弱，需用生扶之法补益。';
    if (d.yongShen.yongWuxing.includes('木')) text += '木可生火助身，';
    if (d.yongShen.yongWuxing.includes('火')) text += '火可扶助日主，';
    if (d.yongShen.yongWuxing.includes('水')) text += '水可生木养局，';
  }

  text += `忌${d.yongShen.avoid}过旺。`;

  return text;
}

// ===== 卡片模板 =====
function cardTemplate(icon, title, subtitle, content, expanded) {
  const exp = expanded ? ' expanded' : '';
  return `<div class="card report-card${exp}">
    <div class="report-card-header" onclick="toggleCard(this.parentElement)">
      <div class="report-card-icon"><i data-lucide="${icon}"></i></div>
      <div class="report-card-title"><h3>${title}</h3><p>${subtitle}</p></div>
      <div class="report-card-toggle"><i data-lucide="chevron-down"></i></div>
    </div>
    <div class="report-card-content">${content}</div>
  </div>`;
}

// ===== 卡片折叠切换 =====
window.toggleCard = function(card) {
  card.classList.toggle('expanded');
  // 重新渲染图标
  setTimeout(() => lucide.createIcons(), 50);
};
