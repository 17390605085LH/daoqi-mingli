<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 600" width="440" height="600">
  <defs>
    <radialGradient id="faceBg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a2035"/><stop offset="100%" stop-color="#1a1525"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#b8960f"/>
    </linearGradient>
    <filter id="faceGlow"><feGaussianBlur stdDeviation="1.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="600" rx="12" fill="url(#faceBg)"/>
  <rect x="2" y="2" width="436" height="596" rx="10" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>

  <text x="220" y="32" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="17" font-weight="bold" letter-spacing="2">面相十二宫 · 观相识命</text>
  <line x1="60" y1="43" x2="380" y2="43" stroke="rgba(212,175,55,0.12)" stroke-width="1"/>

  <g transform="translate(220, 72)">
    <!-- Head / face oval -->
    <ellipse cx="0" cy="200" rx="105" ry="155" fill="rgba(212,175,55,0.03)" stroke="#d4af37" stroke-width="1.5"/>

    <!-- Hair / Top -->
    <path d="M-80,55 Q-40,25 0,18 Q40,25 80,55" fill="rgba(212,175,55,0.04)" stroke="#d4af37" stroke-width="1"/>

    <!-- ===== 官禄宫 (Forehead center) ===== -->
    <ellipse cx="0" cy="80" rx="38" ry="25" fill="none" stroke="rgba(212,175,55,0.35)" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="0" y="78" text-anchor="middle" fill="#d4af37" font-size="11" font-weight="bold">官禄宫</text>

    <!-- ===== 命宫 (Yintang - between brows) ===== -->
    <ellipse cx="0" cy="110" rx="20" ry="12" fill="none" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
    <text x="0" y="109" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">命宫</text>

    <!-- ===== 兄弟宫 (Eyebrows) ===== -->
    <path d="M-65,125 Q-40,118 0,122 Q40,118 65,125" fill="none" stroke="rgba(212,175,55,0.3)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="-82" y="125" fill="#d4af37" font-size="9" text-anchor="end">兄弟</text>
    <text x="82" y="125" fill="#d4af37" font-size="9" text-anchor="start">兄弟</text>

    <!-- Eyes -->
    <ellipse cx="-38" cy="148" rx="22" ry="10" fill="rgba(212,175,55,0.06)" stroke="#d4af37" stroke-width="1.2"/>
    <circle cx="-38" cy="148" r="5" fill="#d4af37" opacity="0.5"/>
    <circle cx="-38" cy="148" r="2.5" fill="#d4af37" opacity="0.8"/>
    <ellipse cx="38" cy="148" rx="22" ry="10" fill="rgba(212,175,55,0.06)" stroke="#d4af37" stroke-width="1.2"/>
    <circle cx="38" cy="148" r="5" fill="#d4af37" opacity="0.5"/>
    <circle cx="38" cy="148" r="2.5" fill="#d4af37" opacity="0.8"/>

    <!-- ===== 田宅宫 (Upper eyelids) ===== -->
    <path d="M-58,140 Q-40,138 0,142 Q40,138 58,140" fill="none" stroke="rgba(250,204,21,0.35)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="-55" y="135" fill="#facc15" font-size="8">田宅</text>
    <text x="48" y="135" fill="#facc15" font-size="8">田宅</text>

    <!-- ===== 夫妻宫 (Outer eye corners) ===== -->
    <ellipse cx="-62" cy="148" rx="14" ry="10" fill="none" stroke="rgba(248,113,113,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="-62" y="143" text-anchor="middle" fill="#f87171" font-size="8" font-weight="bold">夫妻</text>
    <ellipse cx="62" cy="148" rx="14" ry="10" fill="none" stroke="rgba(248,113,113,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="62" y="143" text-anchor="middle" fill="#f87171" font-size="8" font-weight="bold">夫妻</text>

    <!-- ===== 子女宫 (Under eyes) ===== -->
    <path d="M-48,162 Q-38,168 0,172 Q38,168 48,162" fill="none" stroke="rgba(168,85,247,0.35)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="-52" y="172" fill="#a855f7" font-size="8">子女</text>
    <text x="44" y="172" fill="#a855f7" font-size="8">子女</text>

    <!-- ===== 财帛宫 (Nose) ===== -->
    <path d="M0,155 L-10,185 Q-7,198 0,205 Q7,198 10,185 Z" fill="rgba(212,175,55,0.06)" stroke="#d4af37" stroke-width="1.2"/>
    <ellipse cx="0" cy="178" rx="14" ry="18" fill="none" stroke="rgba(34,197,94,0.5)" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="-20" y="178" fill="#22c55e" font-size="9" font-weight="bold" text-anchor="end">财帛</text>

    <!-- ===== 疾厄宫 (Bridge of nose) ===== -->
    <path d="M0,128 L0,162" fill="none" stroke="rgba(239,68,68,0.25)" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- ===== 迁移宫 (Temples) ===== -->
    <ellipse cx="-75" cy="100" rx="16" ry="16" fill="none" stroke="rgba(56,189,248,0.35)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="-75" y="99" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="bold">迁移</text>
    <ellipse cx="75" cy="100" rx="16" ry="16" fill="none" stroke="rgba(56,189,248,0.35)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="75" y="99" text-anchor="middle" fill="#38bdf8" font-size="8" font-weight="bold">迁移</text>

    <!-- ===== 交友宫 (Cheeks) ===== -->
    <ellipse cx="-55" cy="200" rx="18" ry="14" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="-55" y="200" text-anchor="middle" fill="#fbbf24" font-size="8">交友</text>
    <ellipse cx="55" cy="200" rx="18" ry="14" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="55" y="200" text-anchor="middle" fill="#fbbf24" font-size="8">交友</text>

    <!-- Mouth -->
    <path d="M-18,238 Q0,242 18,238" fill="none" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-18,238 Q0,250 18,238" fill="rgba(212,175,55,0.06)" stroke="#d4af37" stroke-width="1"/>
    <path d="M-38,238 Q-42,235 -38,232" fill="none" stroke="#d4af37" stroke-width="0.8"/>
    <path d="M38,238 Q42,235 38,232" fill="none" stroke="#d4af37" stroke-width="0.8"/>

    <!-- ===== 出纳宫 (Corners of mouth) ===== -->
    <text x="-40" y="228" fill="#22c55e" font-size="7">出纳</text>
    <text x="34" y="228" fill="#22c55e" font-size="7">出纳</text>

    <!-- Chin -->
    <path d="M-15,260 Q0,275 15,260" fill="rgba(212,175,55,0.04)" stroke="#d4af37" stroke-width="1"/>

    <!-- ===== 福德宫 (Chin) ===== -->
    <ellipse cx="0" cy="272" rx="18" ry="12" fill="none" stroke="rgba(168,85,247,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="0" y="271" text-anchor="middle" fill="#a855f7" font-size="9" font-weight="bold">福德宫</text>

    <!-- ===== 父母宫 (Sides of forehead) ===== -->
    <ellipse cx="-75" cy="70" rx="16" ry="14" fill="none" stroke="rgba(74,222,128,0.3)" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="-75" y="69" text-anchor="middle" fill="#4ade80" font-size="8">父母</text>
    <ellipse cx="75" cy="70" rx="16" ry="14" fill="none" stroke="rgba(74,222,128,0.3)" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="75" y="69" text-anchor="middle" fill="#4ade80" font-size="8">父母</text>

    <!-- Ear outlines -->
    <path d="M-98,130 Q-105,145 -100,170 Q-95,185 -90,175" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
    <path d="M98,130 Q105,145 100,170 Q95,185 90,175" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>

    <!-- Ears -->
    <text x="-105" y="155" fill="#d4af37" font-size="7" text-anchor="end">福耳</text>
    <text x="105" y="155" fill="#d4af37" font-size="7" text-anchor="start">福耳</text>

    <!-- Three divisions (三停) lines -->
    <line x1="-95" y1="118" x2="95" y2="118" stroke="rgba(212,175,55,0.2)" stroke-width="0.8" stroke-dasharray="5,5"/>
    <text x="-98" y="116" fill="#d4af37" font-size="7">上停</text>
    <line x1="-95" y1="230" x2="95" y2="230" stroke="rgba(212,175,55,0.2)" stroke-width="0.8" stroke-dasharray="5,5"/>
    <text x="-98" y="228" fill="#d4af37" font-size="7">中停</text>
    <text x="95" y="295" fill="#d4af37" font-size="7">下停</text>

    <!-- Centerline -->
    <line x1="0" y1="55" x2="0" y2="285" stroke="rgba(212,175,55,0.1)" stroke-width="0.6" stroke-dasharray="6,8"/>
  </g>

  <!-- Legend -->
  <g transform="translate(15, 495)">
    <text x="0" y="0" fill="#d4af37" font-size="10" font-weight="bold">十二宫图解：</text>
    <rect x="0" y="8" width="8" height="8" rx="2" fill="rgba(74,222,128,0.4)"/><text x="12" y="16" fill="#9ca3af" font-size="9">命宫(印堂)</text>
    <rect x="100" y="8" width="8" height="8" rx="2" fill="rgba(212,175,55,0.4)"/><text x="112" y="16" fill="#9ca3af" font-size="9">官禄</text>
    <rect x="180" y="8" width="8" height="8" rx="2" fill="rgba(34,197,94,0.4)"/><text x="192" y="16" fill="#9ca3af" font-size="9">财帛</text>
    <rect x="260" y="8" width="8" height="8" rx="2" fill="rgba(248,113,113,0.4)"/><text x="272" y="16" fill="#9ca3af" font-size="9">夫妻</text>
    <rect x="340" y="8" width="8" height="8" rx="2" fill="rgba(251,191,36,0.4)"/><text x="352" y="16" fill="#9ca3af" font-size="9">交友</text>
    <rect x="0" y="24" width="8" height="8" rx="2" fill="rgba(168,85,247,0.4)"/><text x="12" y="32" fill="#9ca3af" font-size="9">福德</text>
    <rect x="100" y="24" width="8" height="8" rx="2" fill="rgba(74,222,128,0.4)"/><text x="112" y="32" fill="#9ca3af" font-size="9">父母</text>
    <rect x="180" y="24" width="8" height="8" rx="2" fill="rgba(56,189,248,0.4)"/><text x="192" y="32" fill="#9ca3af" font-size="9">迁移</text>
    <rect x="260" y="24" width="8" height="8" rx="2" fill="rgba(250,204,21,0.4)"/><text x="272" y="32" fill="#9ca3af" font-size="9">田宅</text>
    <rect x="340" y="24" width="8" height="8" rx="2" fill="rgba(168,85,247,0.4)"/><text x="352" y="32" fill="#9ca3af" font-size="9">子女</text>
    <rect x="0" y="40" width="8" height="8" rx="2" fill="rgba(212,175,55,0.4)"/><text x="12" y="48" fill="#9ca3af" font-size="9">兄弟</text>
    <rect x="100" y="40" width="8" height="8" rx="2" fill="rgba(239,68,68,0.4)"/><text x="112" y="48" fill="#9ca3af" font-size="9">疾厄</text>
  </g>

  <text x="400" y="585" fill="rgba(212,175,55,0.2)" font-size="8" text-anchor="end">道器命理 · 面相全图</text>
</svg>
