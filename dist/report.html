<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg">
  <title>命理报告 · 道器</title>
  <meta name="description" content="您的专属命理分析报告。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">道器</a>
    <a href="checkout.html" class="btn btn-primary">预约专家</a>
  </div>
</nav>

<main class="report-page">

  <header class="report-header">
    <h1 id="reportTitle">道器 · 命理推演</h1>
    <p class="subtitle" id="reportLocation"></p>
    <div class="gua-decoration" id="guaDeco"></div>
    <div class="pillar-grid" id="baziDisplay">
      <div class="pillar-cell"><div class="pillar-label">年柱</div><div class="pillar-gan" id="yearGan">—</div><div class="pillar-zhi" id="yearZhi">—</div></div>
      <div class="pillar-cell"><div class="pillar-label">月柱</div><div class="pillar-gan" id="monthGan">—</div><div class="pillar-zhi" id="monthZhi">—</div></div>
      <div class="pillar-cell highlight"><div class="pillar-label">日柱</div><div class="pillar-gan" id="dayGan">—</div><div class="pillar-zhi" id="dayZhi">—</div></div>
      <div class="pillar-cell"><div class="pillar-label">时柱</div><div class="pillar-gan" id="hourGan">—</div><div class="pillar-zhi" id="hourZhi">—</div></div>
    </div>
    <div class="wuxing-ring" id="wuxingRing"></div>
    <div class="ripple-bar gold" style="width:60%;"></div>
    <div class="ripple-bar gold" style="width:40%;margin-top:6px;"></div>
    <div class="ripple-bar gold" style="width:25%;margin-top:6px;"></div>
    <div id="strengthBadge" style="margin-top:12px;"></div>
  </header>

  <nav class="tab-nav">
    <div class="tab-nav-inner" id="tabNavInner"></div>
  </nav>

  <div id="loadingIndicator" style="text-align:center;padding:60px 0;">
    <div class="loading-spin"></div>
    <p style="color:var(--gold);margin-top:16px;">推演中，接通天地之气……</p>
  </div>

  <div id="tabPanels"></div>
  <div id="expertCTA"></div>

</main>

<footer class="footer">
  <p class="footer-copy">© 2026 道器命理 · 紫微斗数 · 四柱八字 · 仅供参考</p>
</footer>

<script>
// ===== HELPERS =====
function safeArr(v) { return Array.isArray(v) ? v : []; }
function safeStr(v, fallback) { return (typeof v === 'string' && v) ? v : (fallback || ''); }

// ===== GUARD =====
const birthData = JSON.parse(sessionStorage.getItem('birthData') || 'null');
if (!birthData || !birthData.name || !birthData.year) { window.location.replace('form.html'); throw new Error('redirect'); }

const hasFacePhoto = sessionStorage.getItem('hasFacePhoto') === 'true';
const hasPalmPhoto = sessionStorage.getItem('hasPalmPhoto') === 'true';
const userLocation = birthData.location || '';
let baziResult = null;
const ZW_PALACES = ['命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友','官禄','田宅','福德','父母'];

// ===== TABS =====
const TABS = [
  { id:'bazi', label:'☯ 命盘总览' },
  { id:'ziwei', label:'⭐ 紫微斗数' },
  { id:'mianxiang', label:'👁 面相分析' },
  { id:'shouxiang', label:'✋ 手相分析' },
  { id:'fengshui', label:'🏠 风水布局' },
  { id:'liunian', label:'📅 流年运势' },
];

function buildTabNav() {
  const nav = document.getElementById('tabNavInner');
  nav.innerHTML = TABS.map((t, i) =>
    `<button class="tab-btn${i === 0 ? ' active' : ''}" data-panel="${t.id}">${t.label}</button>`
  ).join('');
  document.getElementById('tabPanels').innerHTML = TABS.map((t, i) =>
    `<div class="tab-panel${i === 0 ? ' active' : ''}" id="panel-${t.id}"></div>`
  ).join('');
}

// ===== API =====
async function loadReport() {
  const loading = document.getElementById('loadingIndicator');
  try {
    const params = new URLSearchParams();
    params.set('name', birthData.name);
    params.set('gender', birthData.gender || 'male');
    params.set('year', birthData.year);
    params.set('month', birthData.month);
    params.set('day', birthData.day);
    params.set('hour', birthData.hour || '子时');
    params.set('calendar', birthData.calendar || 'solar');

    const resp = await fetch('/api/bazi?' + params.toString());
    if (!resp.ok) throw new Error('API错误: HTTP ' + resp.status);
    const text = await resp.text();
    try { baziResult = JSON.parse(text); } catch { throw new Error('数据解析失败'); }
    if (baziResult.error) throw new Error(baziResult.error);
    loading.style.display = 'none';
    renderHeader();
    renderAllTabs();
    initTabs();
    renderExpertCTA();
    loading.remove();
  } catch (err) {
    console.error('Report load error:', err);
    loading.style.display = 'none';
    const panels = document.getElementById('tabPanels');
    panels.innerHTML = `<div style="text-align:center;padding:40px 20px;">
      <div style="font-size:3rem;margin-bottom:16px;">⚠️</div>
      <h3 style="color:var(--gold);margin-bottom:12px;">加载失败</h3>
      <p style="color:var(--text-muted);font-size:0.9rem;line-height:1.6;margin-bottom:20px;">${err.message || err}</p>
      <button onclick="location.reload()" class="btn btn-primary" style="margin-right:8px;">重新加载</button>
      <a href="form.html" class="btn btn-ghost">返回填写</a>
    </div>`;
  }
}

// ===== Header =====
function renderHeader() {
  const d = baziResult, p = d.pillars;
  document.getElementById('reportTitle').textContent = d.name + ' · 命理报告';
  document.getElementById('reportLocation').innerHTML = userLocation
    ? `📍 ${userLocation} · ${birthData.year}年${birthData.month}月${birthData.day}日 ${birthData.hour}`
    : `${birthData.year}年${birthData.month}月${birthData.day}日 ${birthData.hour}`;
  document.getElementById('yearGan').textContent = p.year[0];
  document.getElementById('yearZhi').textContent = p.year[1];
  document.getElementById('monthGan').textContent = p.month[0];
  document.getElementById('monthZhi').textContent = p.month[1];
  document.getElementById('dayGan').textContent = p.day[0];
  document.getElementById('dayZhi').textContent = p.day[1];
  document.getElementById('hourGan').textContent = p.hour[0];
  document.getElementById('hourZhi').textContent = p.hour[1];

  const wc = d.wuxingCount, wnn = { '金':'metal','木':'wood','水':'water','火':'fire','土':'earth' };
  const ring = document.getElementById('wuxingRing');
  ring.innerHTML = Object.entries(wnn).map(([k, v]) => {
    const cnt = wc[k] || 0;
    return `<div class="wuxing-node ${v}" data-count="${cnt}" style="opacity:${0.3 + (cnt/8)*0.7}">${k}</div>`;
  }).join('');

  const s = d.strength, sc = s.includes('强') ? 'var(--red)' : s.includes('弱') ? 'var(--jade)' : 'var(--gold)';
  document.getElementById('strengthBadge').innerHTML =
    `<span style="display:inline-block;padding:6px 18px;border-radius:100px;font-size:0.9rem;background:${sc}15;color:${sc};border:1px solid ${sc}30;">日主 ${d.dayMaster}${d.dayWuxing} · ${s}</span>`;

  const guas = ['111111','000000','111010','010111','101010','110011','001100','100010'];
  const gArr = guas[Math.floor(Math.random() * guas.length)].split('');
  document.getElementById('guaDeco').innerHTML = gArr.map(l =>
    l === '1' ? '<div class="gua-line yang"></div>' : '<div class="gua-line yin"><span></span><span></span></div>'
  ).join('');
}

// ===== Render all tabs =====
function renderAllTabs() {
  const d = baziResult;
  const safeBuild = (fn) => { try { return fn(); } catch(e) { console.error(e); return '<div class="tech-card"><p style="color:var(--red);text-align:center;padding:20px;">⚠ 数据加载异常：' + (e.message || e) + '</p></div>'; } };
  document.getElementById('panel-bazi').innerHTML = safeBuild(() => buildBaziPanel(d));
  document.getElementById('panel-ziwei').innerHTML = safeBuild(() => buildZiweiPanel(d));
  document.getElementById('panel-mianxiang').innerHTML = safeBuild(() => hasFacePhoto ? buildMianXiangPanel(d) : buildPhotoPlaceholder('面相', 'face'));
  document.getElementById('panel-shouxiang').innerHTML = safeBuild(() => hasPalmPhoto ? buildShouXiangPanel(d) : buildPhotoPlaceholder('手相', 'palm'));
  document.getElementById('panel-fengshui').innerHTML = safeBuild(() => buildFengshuiPanel(d));
  document.getElementById('panel-liunian').innerHTML = safeBuild(() => buildLiunianPanel(d));
}

function renderExpertCTA() {
  document.getElementById('expertCTA').innerHTML = `<div class="expert-cta">
    <div style="font-size:0.75rem;color:var(--text-muted);letter-spacing:2px;">真人专家 · 医命双修</div>
    <h3>山医堂主</h3>
    <p style="color:var(--text-muted);max-width:400px;margin:8px auto 20px;font-size:0.9rem;">AI推演为基，真人断命为核。能开药方、调风水、做养生方案——身体+命理双重诊断。</p>
    <a href="checkout.html" class="btn btn-primary">预约真人问诊</a>
  </div>`;
}

function buildPhotoPlaceholder(type, key) {
  const icon = key === 'face' ? '👁' : '✋';
  return `<div class="tech-card">
    <div class="photo-placeholder">
      <div class="icon">${icon}</div>
      <h3 style="color:var(--gold);margin-bottom:8px;">请上传${type}照片以解锁分析</h3>
      <p style="color:var(--text-muted);max-width:400px;margin:0 auto;font-size:0.9rem;">
        上传清晰的面部正面照或手掌照片即可获取精准${type}分析。<a href="form.html" style="color:var(--gold);">返回填写页</a>上传。
      </p>
    </div>
  </div>`;
}

// ===== Tabs init =====
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    });
  });
}

// ===== Card helper =====
function techCard(icon, title, subtitle, content) {
  return `<div class="tech-card">
    <div class="tech-card-header">
      <div class="tech-card-icon">${icon}</div>
      <div><div class="tech-card-title">${title}</div><div class="tech-card-sub">${subtitle}</div></div>
    </div>
    <div>${content}</div>
  </div>`;
}

// =====================================================
//  TAB 1: 命盘总览
// =====================================================
function buildBaziPanel(d) {
  const p = d.personality || {};
  let pos = safeArr(p.traits || p.positive).map(t => '<li style="padding:2px 0;">✦ ' + t + '</li>').join('');
  let neg = safeArr(p.flaws || p.negative).map(t => '<li style="padding:2px 0;">◇ ' + t + '</li>').join('');

  const wc = d.wuxingCount;
  const wn = ['金','木','水','火','土'];
  const wm = { '金':'#A8A9AD','木':'#6B8E23','水':'#4682B4','火':'#DC3545','土':'#CD853F' };
  const maxV = Math.max(...wn.map(k => wc[k] || 0), 1);
  let bars = wn.map(k => {
    const v = wc[k]||0, pct = Math.round(v/maxV*100);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="width:20px;color:${wm[k]};font-weight:600;">${k}</span>
      <div style="flex:1;height:14px;background:rgba(13,17,23,0.6);border-radius:4px;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:${wm[k]};border-radius:4px;transition:width 1s ease;"></div>
      </div><span style="font-size:0.8rem;color:var(--text-muted);width:18px;">${v}</span>
    </div>`;
  }).join('');

  const g = d.luckyGuide || {};
  const ss = d.shiShen || {};
  const pn = { year:'年柱', month:'月柱', day:'日柱', hour:'时柱' };
  let shenRows = Object.entries(ss).map(([k, v]) =>
    `<div style="display:flex;justify-content:space-between;padding:6px 8px;background:rgba(26,31,46,0.4);border-radius:6px;margin-bottom:4px;font-size:0.9rem;">
      <span style="color:var(--text-muted);min-width:40px;">${pn[k]||k}</span>
      <span style="color:var(--gold);font-weight:600;">${v[0]}</span>
      <span style="color:var(--text-muted);font-size:0.8rem;">${v[1]}</span>
    </div>`
  ).join('');

  return `
    ${techCard('🧬', '日主性格', `日主${d.dayMaster}${d.dayWuxing} · ${d.strength}`,
      `<p style="margin-bottom:16px;font-size:0.9rem;">日主 <strong style="color:var(--gold);">${d.dayMaster}${d.dayWuxing}</strong>，命局${d.strength}。${(d.yongShen||{}).principle || ''}</p>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
        <div style="padding:12px;background:rgba(26,31,46,0.4);border-radius:8px;border-left:3px solid #4A9E8B;">
          <div style="font-size:0.8rem;color:var(--jade);margin-bottom:6px;">✦ 优势特质</div>
          <ul style="list-style:none;font-size:0.85rem;line-height:1.7;">${pos}</ul>
        </div>
        <div style="padding:12px;background:rgba(26,31,46,0.4);border-radius:8px;border-left:3px solid var(--red);">
          <div style="font-size:0.8rem;color:var(--red);margin-bottom:6px;">◇ 需注意</div>
          <ul style="list-style:none;font-size:0.85rem;line-height:1.7;">${neg}</ul>
        </div>
      </div>`)}

    ${techCard('📊', '五行分布', (d.yongShen||{}).principle || '',
      bars + `<div style="margin-top:12px;padding:10px;background:rgba(201,168,76,0.05);border-radius:8px;border-left:3px solid var(--gold);font-size:0.9rem;">
        <strong style="color:var(--gold);">用神：${(d.yongShen||{}).yongShen || '—'}</strong>
        <span style="color:var(--red);margin-left:12px;">忌：${(d.yongShen||{}).avoid || '—'}</span>
      </div>`)}

    ${d.daoyi ? techCard('🩺', '道医体质辨识', '五行偏颇 → 体质归类 → 调养方案',
      buildDaoyiPanel(d)) : ''}

    ${techCard('⏳', '人生阶段详析', '童蒙 · 少年 · 青年 · 而立 · 不惑 · 知命 · 耳顺 · 古稀 · 耄耋',
      buildLifeStageAnalysis(d))}

    ${techCard('🔗', '十神关系', '天干生克互动', shenRows)}

    ${techCard('⭐', '喜用神 · 吉祥指南', '趋吉避凶之钥',
      `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
        <div style="text-align:center;padding:12px;background:rgba(26,31,46,0.4);border-radius:8px;">
          <div style="font-size:1.5rem;">🧭</div><div style="font-size:0.75rem;color:var(--text-muted);">幸运方位</div>
          <div style="font-weight:600;font-size:0.9rem;">${safeArr(g.directions).join(' / ') || '—'}</div>
        </div>
        <div style="text-align:center;padding:12px;background:rgba(26,31,46,0.4);border-radius:8px;">
          <div style="font-size:1.5rem;">🎨</div><div style="font-size:0.75rem;color:var(--text-muted);">幸运颜色</div>
          <div style="font-weight:600;font-size:0.9rem;">${safeArr(g.colors).join(' / ') || '—'}</div>
        </div>
        <div style="text-align:center;padding:12px;background:rgba(26,31,46,0.4);border-radius:8px;">
          <div style="font-size:1.5rem;">🔢</div><div style="font-size:0.75rem;color:var(--text-muted);">幸运数字</div>
          <div style="font-weight:600;font-size:0.9rem;">${safeArr(g.numbers).join(', ') || '—'}</div>
        </div>
      </div>
      <div style="padding:10px;background:rgba(74,158,139,0.06);border-radius:8px;font-size:0.9rem;">
        <strong style="color:var(--jade);">适合行业</strong>
        <p style="margin-top:4px;">${safeArr(g.industries).join('、') || '—'}</p>
      </div>`)}

    ${buildJixiongCard(d)}
  `;
}

function buildDaoyiPanel(d) {
  const dy = d.daoyi;
  if (!dy) return '<p style="text-align:center;padding:20px;color:var(--text-muted);">道医体质分析数据暂不可用，请尝试提供更多个人信息。</p>';
  const sc = {'春季':'#6B8E23','夏季':'#DC3545','秋季':'#A8A9AD','冬季':'#4682B4'};
  return `<div style="margin-bottom:16px;">
    <div style="font-size:1.3rem;color:${sc[dy.season]||'#CD853F'};font-weight:700;font-family:var(--font-serif);margin-bottom:4px;">${dy.primaryType}</div>
    <p style="font-size:0.9rem;line-height:1.7;">${dy.primaryDesc}</p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div>
      <div style="font-weight:600;color:var(--gold);margin-bottom:6px;">📋 典型症状</div>
      <ul style="list-style:none;font-size:0.85rem;">${safeArr(dy.primarySymptoms).map(s => '<li style="padding:4px 0;border-bottom:1px solid rgba(201,168,76,0.06);">🔸 ' + s + '</li>').join('')}</ul>
    </div>
    <div>
      <div style="font-weight:600;color:var(--gold);margin-bottom:6px;">🎯 关联体质</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">${safeArr(dy.secondaryTypes).map(t => '<span style="padding:4px 10px;background:rgba(74,158,139,0.08);border-radius:100px;font-size:0.8rem;color:var(--jade);">' + t + '</span>').join('')}</div>
      <div style="font-weight:600;color:var(--gold);margin-bottom:6px;">🏥 薄弱脏腑</div>
      <p style="font-size:0.9rem;"><strong style="color:var(--red);">脏：${dy.weakOrgan}</strong> · <strong style="color:var(--red);">腑：${dy.weakFu}</strong></p>
      <p style="font-size:0.85rem;color:var(--text-muted);">${dy.organAdvice}</p>
    </div>
  </div>
  <div style="margin-top:12px;padding:10px;background:rgba(74,158,139,0.06);border-radius:8px;border-left:3px solid var(--jade);">
    <strong style="color:var(--jade);">🥗 饮食建议</strong>
    <p style="margin-top:4px;font-size:0.9rem;line-height:1.7;">${dy.dietAdvice}</p>
  </div>
  <div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <div style="padding:10px;background:rgba(201,168,76,0.05);border-radius:8px;">
      <strong style="color:var(--gold);">💆 穴位调理</strong>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">${safeArr(dy.acupoints).map(a => '<span style="padding:3px 8px;background:rgba(201,168,76,0.1);border:1px solid var(--gold-dim);border-radius:100px;font-size:0.78rem;font-family:monospace;">' + a + '</span>').join('')}</div>
    </div>
    <div style="padding:10px;background:rgba(201,168,76,0.05);border-radius:8px;">
      <strong style="color:var(--gold);">🏃 日常调养</strong>
      <p style="margin-top:6px;font-size:0.85rem;line-height:1.6;">${dy.dailyAdvice}</p>
    </div>
  </div>
  <div style="margin-top:8px;padding:10px;background:rgba(107,91,149,0.05);border-radius:8px;">
    <strong style="color:#6B5B95;">🌿 药方方向</strong>
    <p style="margin-top:4px;font-size:0.9rem;">${dy.herbalDirection}</p>
  </div>`;
}

// ===== 人生阶段分析 =====
function buildLifeStageAnalysis(d) {
  const dayWx = d.dayWuxing, strength = d.strength, dayStem = d.dayMaster;
  const yongWx = safeArr((d.yongShen||{}).yongWuxing)[0] || '土', avoidWx = (d.yongShen||{}).avoid || '';
  const isStrong = strength.includes('强');

  const P = {
    '甲':{ac:'聪颖善悟，理解力强，适合学术研究与专业深耕',hl:'注意肝胆保养，忌酗酒熬夜',wl:'青年正财稳步增长，中年可适当投资'},
    '乙':{ac:'灵活善变通，举一反三，文科艺术天赋突出',hl:'注意颈椎与神经系统，保持规律运动',wl:'细水长流型，适合储蓄与长期理财'},
    '丙':{ac:'热情高但持久力不足，需培养专注与深度',hl:'注意心血管和眼睛，忌熬夜上火',wl:'波动较大，高涨期善于抓机会，低谷需守'},
    '丁':{ac:'专注力强，精于钻研，适合技术型深度学习',hl:'注意心脏和血液循环，作息规律',wl:'正财稳定，中年后有投资眼光'},
    '戊':{ac:'扎实稳健，厚积薄发，适合系统化学习',hl:'注意脾胃消化，饮食规律，忌生冷',wl:'稳定增长型，适合固定资产配置'},

function switchStage(idx) {
  document.querySelectorAll('.stage-tab').forEach((b, i) => b.classList.toggle('active', i === idx));

    c.classList.toggle('active', i === idx);
    c.style.display = i === idx ? 'block' : 'none';
  });
}

function buildZiweiPanel(d) {
  const zw = d.ziwei;
  if (!zw) return '<div class="tech-card"><p style="text-align:center;padding:20px;color:var(--text-muted);">紫微斗数数据暂不可用</p></div>';

  const rawBranches = ['巳','午','未','申','辰','酉','卯','戌','寅','丑','子','亥'];
  const branchPalaceMap = {};
  const pd = zw.palaceDetails || {};
  const mingIdx2 = ZW_PALACES.indexOf(zw.mingPalace);
  for (let i = 0; i < 12; i++) {
    branchPalaceMap[rawBranches[i]] = { name: ZW_PALACES[(mingIdx2 + i) % 12], details: pd[ZW_PALACES[(mingIdx2 + i) % 12]] || {} };
  }

  let gridHtml = '<div class="zw-wt-container">';
  const positions = [
    { branch:'巳' },{ branch:'午' },{ branch:'未' },{ branch:'申' },
    { branch:'辰' },{ empty:true },{ empty:true },{ branch:'酉' },
    { branch:'卯' },{ empty:true },{ empty:true },{ branch:'戌' },
    { branch:'寅' },{ branch:'丑' },{ branch:'子' },{ branch:'亥' },
  ];
  const briColors = { '庙':'#FFD700','旺':'#FFA500','得':'#4A9E8B','利':'#87CEEB','平':'#A0A0A0','陷':'#C75B5B' };

  positions.forEach(pos => {
    if (pos.empty) {
      gridHtml += '<div class="zw-wt-empty">☯</div>';
    } else {
      const info = branchPalaceMap[pos.branch] || {}, detail = info.details || {};
      const isMing = info.name === zw.mingPalace, isShen = info.name === zw.shenPalace;
      let cls = (isMing ? ' ming' : '') + (isShen ? ' shen' : '');
      let starsHtml = '';
      (detail.mainStars || []).forEach(s => {
        const bri = (detail.mainStarBrightness||{})[s] || '平';
        starsHtml += `<span>${s}<sup style="font-size:0.6rem;color:${briColors[bri]||'#A0A0A0'};">${bri}</sup></span><br>`;
      });
      if ((detail.siHuas || []).length > 0) {
        const labels = {'lu':'化禄','quan':'化权','ke':'化科','ji':'化忌'};
        const colors = {'lu':'#4A9E8B','quan':'#C9A84C','ke':'#6B5B95','ji':'#C75B5B'};
        if ((detail.siHuas || []).length > 0) starsHtml += '<span style="font-size:0.68rem;">' + detail.siHuas.map(sh => `<span style="color:${colors[sh.type]||'#C9A84C'};">${labels[sh.type]||sh.type}</span>`).join(' ') + '</span><br>';
      }
      if ((detail.luckyStars || []).length > 0) starsHtml += '<span style="font-size:0.65rem;color:#4A9E8B;">' + detail.luckyStars.join(' ') + '</span><br>';
      if ((detail.fierceStars || []).length > 0) starsHtml += '<span style="font-size:0.65rem;color:#C75B5B;">' + detail.fierceStars.join(' ') + '</span><br>';
      if (!starsHtml) starsHtml = '<span style="color:#3a3a3a;">—</span>';
      gridHtml += `<div class="zw-wt-cell${cls}"><span class="zw-branch">${pos.branch}</span><div class="zw-pname">${info.name||''}</div><div class="zw-stars">${starsHtml}</div></div>`;
    }
  });
  gridHtml += '</div>';

  let keyHtml = '';
  const ka = zw.keyAnalysis || {};
  for (const palace in ka) {
    keyHtml += `<div style="padding:10px 12px;background:rgba(26,31,46,0.4);border-radius:8px;margin-bottom:6px;font-size:0.9rem;">
      <strong style="color:var(--gold);">${palace}</strong>
      <p style="margin-top:4px;line-height:1.6;">${ka[palace]}</p></div>`;
  }

  const mingStars = safeArr(zw.mingStars).length ? safeArr(zw.mingStars).join('、') : '无主星';
  const shenStars = safeArr(zw.shenStars).length ? safeArr(zw.shenStars).join('、') : '无主星';

  return `
    ${techCard('🧭', '命身宫', '紫微斗数核心',
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="padding:14px;background:var(--gold-dim);border-radius:8px;border:1px solid var(--gold-soft);text-align:center;">
          <div style="font-size:0.8rem;color:var(--text-muted);">命宫</div>
          <div style="font-size:1.4rem;color:var(--gold);font-family:var(--font-serif);">${zw.mingPalace}</div>
          <div style="color:var(--gold);font-weight:500;">主星：${mingStars}</div>
          <div style="margin-top:8px;font-size:0.9rem;line-height:1.6;">${zw.mingInterpret}</div>
        </div>
        <div style="padding:14px;background:rgba(74,158,139,0.05);border-radius:8px;border:1px solid rgba(74,158,139,0.2);text-align:center;">
          <div style="font-size:0.8rem;color:var(--text-muted);">身宫</div>
          <div style="font-size:1.4rem;color:var(--jade);font-family:var(--font-serif);">${zw.shenPalace}</div>
          <div style="color:var(--jade);font-weight:500;">主星：${shenStars}</div>
          <div style="margin-top:8px;font-size:0.9rem;line-height:1.6;">${zw.shenInterpret}</div>
        </div>
      </div>
      <div style="margin-top:12px;text-align:center;">
        <span style="display:inline-block;padding:4px 16px;background:var(--gold-dim);border-radius:100px;">
          五行局：<strong style="color:var(--gold);">${zw.wuxingJu}</strong> · 紫微在 <strong style="color:var(--gold);">${zw.ziweiPosition}</strong>
        </span>
      </div>`)}

    ${techCard('🌐', '紫微命盘', '十二宫星辰飞布 · 庙旺得利平陷',
      gridHtml + `<div style="display:flex;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap;font-size:0.72rem;color:var(--text-muted);">
        <span><span style="color:#FFD700;">●</span> 庙</span><span><span style="color:#FFA500;">●</span> 旺</span>
        <span><span style="color:#4A9E8B;">●</span> 得</span><span><span style="color:#87CEEB;">●</span> 利</span>
        <span><span style="color:#A0A0A0;">●</span> 平</span><span><span style="color:#C75B5B;">●</span> 陷</span>
      </div>`)}

    ${techCard('🎯', '重点宫位解读', '关键人生领域', keyHtml)}
  `;
}

  ];
  return `
    ${techCard('🏠', '居家风水布局', d.fengshui.generalAdvice,
      `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;">
        ${rooms.map(r => `<div style="padding:10px;background:rgba(26,31,46,0.4);border-radius:8px;">
          <div style="font-size:1.2rem;">${r.icon}</div><strong>${r.name}</strong>
          <p style="font-size:0.85rem;color:var(--text-muted);margin-top:4px;">${r.text}</p></div>`).join('')}
      </div>`)}
    ${techCard('🎨', '色彩 · 绿植 · 规避', '细节调和建议',
      `<div style="padding:10px;background:rgba(74,158,139,0.06);border-radius:6px;margin-bottom:8px;"><strong style="color:var(--jade);">色彩方案</strong><br><span style="font-size:0.9rem;">${yf.colors}</span></div>
      <div style="padding:10px;background:rgba(74,158,139,0.06);border-radius:6px;margin-bottom:8px;"><strong style="color:var(--jade);">🌱 绿植</strong><br><span style="font-size:0.9rem;">${yf.plants}</span></div>
      <div style="padding:10px;background:rgba(201,168,76,0.06);border-radius:6px;"><strong style="color:var(--gold);">⚠ 规避</strong><br><span style="font-size:0.9rem;">${yf.avoid}</span></div>`)}
  `;
}

// =====================================================
//  TAB 6: 流年运势
// =====================================================
function buildLiunianPanel(d) {
  const cl = d.currentYearLuck;
  if (!cl) return '<div class="tech-card"><p style="text-align:center;padding:20px;color:var(--text-muted);">流年运势数据暂不可用</p></div>';
  const colors = { '大吉':'#4A9E8B','小吉':'#4A9E8B','平稳':'#C9A84C','需注意':'#C75B5B','挑战多':'#C75B5B' };
  const ml = d.monthlyLuck || [];
  const mColors = { '上升':'#4A9E8B','平稳':'#C9A84C','波动':'#C75B5B' };

  let monthsHtml = ml.map(m =>
    `<div style="text-align:center;padding:6px 4px;background:rgba(26,31,46,0.4);border-radius:6px;font-size:0.8rem;">
      <strong>${m.month}月</strong><br>
      <span style="color:${mColors[m.status]};font-size:0.75rem;">${m.status}</span></div>`
  ).join('');

  return `
    ${techCard('📅', `${cl.year}年 · 流年运势`, `岁君 ${cl.yearPillar}`,
      `<div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:3rem;font-weight:700;font-family:var(--font-serif);background:linear-gradient(135deg,#C9A84C,#E8C97A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${cl.overall}</div>
        <div style="color:${colors[cl.overall]};font-size:1rem;font-weight:500;">总体运势评级</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
        <div style="padding:12px;background:rgba(26,31,46,0.4);border-radius:8px;text-align:center;">
          <div style="font-size:0.85rem;color:var(--text-muted);">💼 事业</div>
          <div style="font-weight:500;margin-top:4px;">${cl.career}</div></div>
        <div style="padding:12px;background:rgba(26,31,46,0.4);border-radius:8px;text-align:center;">
          <div style="font-size:0.85rem;color:var(--text-muted);">💰 财运</div>
          <div style="font-weight:500;margin-top:4px;">${cl.wealth}</div></div>
        <div style="padding:12px;background:rgba(26,31,46,0.4);border-radius:8px;text-align:center;">
          <div style="font-size:0.85rem;color:var(--text-muted);">💕 感情</div>
          <div style="font-weight:500;margin-top:4px;">${cl.love}</div></div>
        <div style="padding:12px;background:rgba(26,31,46,0.4);border-radius:8px;text-align:center;">
          <div style="font-size:0.85rem;color:var(--text-muted);">🏥 健康</div>
          <div style="font-weight:500;margin-top:4px;">${cl.health}</div></div>
      </div>`)}

    ${techCard('📆', '流月趋势', `${cl.year}年 逐月走势`,
      `<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;">${monthsHtml}</div>
      <p style="margin-top:10px;font-size:0.8rem;color:var(--text-muted);text-align:center;">
        <span style="color:#4A9E8B;">● 上升</span> &nbsp;
        <span style="color:#C9A84C;">● 平稳</span> &nbsp;
        <span style="color:#C75B5B;">● 波动</span></p>`)}
  `;
}

// ===== 趋吉避凶 =====
function buildJixiongCard(d) {
  const g = d.luckyGuide;
  const yiItems = [`穿戴${safeArr(g.colors)[0] || '—'}色系衣物饰品`, `多接近${safeArr(g.directions)[0] || '—'}方位`, `从事${safeArr(g.industries).slice(0,2).join('、') || '—'}相关行业`, '上午（7-11点）做重要决定', '保持积极心态，顺势而为'];
  const jiItems = ['避免过于鲜艳的衣物', '下午（13-17点）不宜做重大决策', '忌冲动行事、与人争执', '忌长期熬夜透支', '忌投机取巧'];
  return techCard('🛡', '趋吉避凶 · 行动指南', '基于命局的实用建议',
    `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div><h4 style="color:var(--jade);margin-bottom:8px;">✦ 宜</h4><ul style="list-style:none;font-size:0.9rem;">${yiItems.map(t => '<li style="padding:4px 0;padding-left:18px;position:relative;"><span style="position:absolute;left:0;color:var(--jade);">✦</span>' + t + '</li>').join('')}</ul></div>
      <div><h4 style="color:var(--red);margin-bottom:8px;">✗ 忌</h4><ul style="list-style:none;font-size:0.9rem;">${jiItems.map(t => '<li style="padding:4px 0;padding-left:18px;position:relative;"><span style="position:absolute;left:0;color:var(--red);">✗</span>' + t + '</li>').join('')}</ul></div>
    </div>`);
}

buildTabNav();
document.addEventListener('DOMContentLoaded', loadReport);
